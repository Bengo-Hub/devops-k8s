apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgresql-backup
  namespace: infra
spec:
  schedule: "0 2 * * *"  # Daily at 2am UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            # Run as non-root user with write access to backup PVC
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
          containers:
            - name: pg-backup
              image: postgres:17-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_DIR="/backups"
                  FILENAME="bengobox_${TIMESTAMP}.sql.gz"

                  # Ensure backup dir is writable
                  mkdir -p ${BACKUP_DIR}

                  # Check available disk space before backup (abort if <500MB free)
                  AVAIL=$(df -m ${BACKUP_DIR} | awk 'NR==2{print $4}')
                  if [ "$AVAIL" -lt 500 ]; then
                    echo "ERROR: Only ${AVAIL}MB available in backup dir — aborting backup to prevent disk full"
                    exit 1
                  fi
                  echo "Disk space OK: ${AVAIL}MB available"

                  echo "Starting PostgreSQL backup at $(date)"
                  # Platform DR backup: pg_dumpall captures ALL cluster databases (every
                  # per-service DB on the shared postgresql-0) plus globals/roles.
                  pg_dumpall -h $PGHOST -U $PGUSER | gzip -9 > "${BACKUP_DIR}/${FILENAME}"

                  SIZE=$(du -h "${BACKUP_DIR}/${FILENAME}" | cut -f1)
                  echo "Backup completed: ${FILENAME} (${SIZE})"

                  # Retention churn: delete dump files older than BACKUP_RETENTION_DAYS
                  # (default 4, mirroring the per-service tenant-scoped backup churn).
                  RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-4}
                  find ${BACKUP_DIR} -name "bengobox_*.sql.gz" -mtime +${RETENTION_DAYS} -delete
                  echo "Cleanup completed (removed dumps older than ${RETENTION_DAYS} days)."

                  # Generate manifest.json for auth-api backup listing endpoint
                  echo '{"backups": [' > ${BACKUP_DIR}/manifest.json
                  FIRST=true
                  for f in $(ls -t ${BACKUP_DIR}/bengobox_*.sql.gz 2>/dev/null); do
                    FNAME=$(basename "$f")
                    FSIZE=$(du -h "$f" | cut -f1)
                    FDATE=$(stat -c '%Y' "$f" 2>/dev/null || stat -f '%m' "$f" 2>/dev/null)
                    if [ "$FIRST" = true ]; then FIRST=false; else echo ',' >> ${BACKUP_DIR}/manifest.json; fi
                    echo "{\"filename\": \"${FNAME}\", \"size\": \"${FSIZE}\", \"created_at\": ${FDATE}}" >> ${BACKUP_DIR}/manifest.json
                  done
                  echo ']}' >> ${BACKUP_DIR}/manifest.json

                  echo "Manifest updated. Available backups:"
                  ls -lh ${BACKUP_DIR}/bengobox_*.sql.gz 2>/dev/null || echo "No backups found"
              env:
                # Retention window for the platform DR dumps (days). Default 4, matching the
                # per-service tenant-scoped backup churn (BACKUP_RETENTION_DAYS).
                - name: BACKUP_RETENTION_DAYS
                  value: "4"
                - name: PGHOST
                  value: "postgresql.infra.svc.cluster.local"
                # PostgreSQL admin user = admin_user (set via POSTGRES_USER in Bitnami chart)
                - name: PGUSER
                  value: "admin_user"
                # Secret name is 'postgresql' (Bitnami chart default), key is 'admin-user-password'
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql
                      key: admin-user-password
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgresql-backup-pvc
---
# PVC for backup storage (shared between CronJob and backup-server)
# NOTE: local-path storage class does NOT support in-place resize.
# To expand on a running cluster:
#   1. kubectl delete deployment backup-server -n infra
#   2. kubectl delete pvc postgresql-backup-pvc -n infra  (loses existing backups)
#   3. kubectl apply -f manifests/backup/postgresql-backup-cronjob.yaml
#   4. ArgoCD will recreate the PVC at 20Gi and redeploy the backup server
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-backup-pvc
  namespace: infra
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
# Lightweight nginx server to serve backup files internally
# Auth-api proxies requests to this service for authenticated platform admins
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-server
  namespace: infra
  labels:
    app: backup-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-server
  template:
    metadata:
      labels:
        app: backup-server
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      initContainers:
        - name: seed-manifest
          image: busybox:1.36
          command: ['sh', '-c', 'if [ ! -f /backups/manifest.json ]; then echo ''{"backups": []}'' > /backups/manifest.json; fi']
          volumeMounts:
            - name: backup-storage
              mountPath: /backups
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: backup-storage
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /manifest.json
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: backup-storage
          persistentVolumeClaim:
            claimName: postgresql-backup-pvc
        - name: nginx-config
          configMap:
            name: backup-server-nginx-config
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-server-nginx-config
  namespace: infra
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      autoindex off;

      # Only allow manifest.json and .sql.gz files
      location = /manifest.json {
        add_header Content-Type application/json;
      }
      location ~ \.sql\.gz$ {
        add_header Content-Disposition "attachment";
        add_header Content-Type application/gzip;
      }
      location / {
        return 404;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: backup-server
  namespace: infra
spec:
  selector:
    app: backup-server
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
