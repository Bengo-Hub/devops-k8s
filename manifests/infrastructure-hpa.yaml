---
# VPA for PostgreSQL — recommendation-only. NEVER auto-evict a database StatefulSet.
# Auto mode caused periodic PostgreSQL evictions (~90s downtime) which cascaded to
# PgBouncer caching server_login_retry errors, taking down ALL services cluster-wide.
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: postgresql-vpa
  namespace: infra
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: postgresql
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: postgresql
        minAllowed:
          cpu: 1000m
          memory: 3Gi
        maxAllowed:
          cpu: 4000m
          memory: 12Gi
        controlledResources:
          - cpu
          - memory
---
# VPA for Redis — recommendation-only. Auto mode caused 300+ restarts cascading
# to ordering-backend rate-limiter context deadline exceeded errors.
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: redis-vpa
  namespace: infra
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: redis-master
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: redis
        minAllowed:
          cpu: 200m
          memory: 512Mi
        maxAllowed:
          cpu: 2000m
          memory: 4Gi
        controlledResources:
          - cpu
          - memory
