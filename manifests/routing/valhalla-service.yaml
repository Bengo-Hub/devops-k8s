apiVersion: v1
kind: Service
metadata:
  name: valhalla
  namespace: logistics
  labels:
    app: valhalla
    component: routing-engine
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8002
      targetPort: 8002
      protocol: TCP
  selector:
    app: valhalla
---
# Ingress for debug/admin access only - can be disabled in production
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: valhalla
  namespace: logistics
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - routing.codevertexitsolutions.com
      secretName: valhalla-tls
  rules:
    - host: routing.codevertexitsolutions.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: valhalla
                port:
                  number: 8002
