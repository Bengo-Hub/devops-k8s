apiVersion: apps/v1
kind: Deployment
metadata:
  name: tileserver
  namespace: logistics
  labels:
    app: tileserver
    component: map-tiles
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tileserver
  template:
    metadata:
      labels:
        app: tileserver
        component: map-tiles
    spec:
      initContainers:
        # Generate Kenya MBTiles on first run via Planetiler
        - name: generate-tiles
          image: ghcr.io/onthegomap/planetiler:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /data/tiles
              MBTILES="/data/tiles/kenya.mbtiles"

              if [ -f "$MBTILES" ] && [ -s "$MBTILES" ]; then
                echo "Tiles already exist at $MBTILES, skipping generation."
                exit 0
              fi

              echo "Generating Kenya vector tiles from Geofabrik OSM extract..."
              java -jar /app/planetiler.jar \
                --area=kenya \
                --download \
                --download-threads=2 \
                --output="$MBTILES" \
                --force \
                --nodemap-type=array \
                --storage=ram \
                2>&1

              if [ -f "$MBTILES" ] && [ -s "$MBTILES" ]; then
                echo "Tile generation complete: $(du -h $MBTILES | cut -f1)"
              else
                echo "ERROR: Tile generation failed."
                exit 1
              fi
          volumeMounts:
            - name: tileserver-data
              mountPath: /data
          resources:
            requests:
              cpu: "1"
              memory: 3Gi
            limits:
              cpu: "4"
              memory: 6Gi
      containers:
        - name: tileserver
          image: maptiler/tileserver-gl:latest
          args:
            - --config
            - /data/config.json
            - --verbose
            - --port
            - "8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: tileserver-data
              mountPath: /data
            - name: tileserver-config
              mountPath: /data/config.json
              subPath: config.json
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: tileserver-data
          persistentVolumeClaim:
            claimName: tileserver-data
        - name: tileserver-config
          configMap:
            name: tileserver-config
