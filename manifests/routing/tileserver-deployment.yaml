apiVersion: apps/v1
kind: Deployment
metadata:
  name: tileserver
  namespace: logistics
  labels:
    app: tileserver
    component: map-tiles
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tileserver
  template:
    metadata:
      labels:
        app: tileserver
        component: map-tiles
    spec:
      initContainers:
        # Init container downloads Kenya tiles on first run
        - name: download-tiles
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              set -e
              MBTILES="/data/kenya.mbtiles"
              if [ -f "$MBTILES" ] && [ -s "$MBTILES" ]; then
                echo "Tiles already exist, skipping download."
                exit 0
              fi

              echo "Installing wget..."
              apk add --no-cache wget

              echo "Downloading Kenya vector tiles..."
              # Protomaps provides free PMTiles extracts per country
              # For mbtiles, use Planetiler or OpenMapTiles
              wget -q --show-progress -O "$MBTILES" \
                "https://build.protomaps.com/20240101-kenya.pmtiles" \
                2>&1 || true

              if [ ! -f "$MBTILES" ] || [ ! -s "$MBTILES" ]; then
                echo "WARNING: Could not download tiles. You need to manually provision tile data."
                echo "Options:"
                echo "  1. java -jar planetiler.jar --area=kenya --output=/data/kenya.mbtiles"
                echo "  2. Download from https://data.maptiler.com/downloads/tileset/osm/africa/kenya/"
                echo "Creating placeholder so pod starts..."
                touch "$MBTILES"
              fi
          volumeMounts:
            - name: tileserver-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      containers:
        - name: tileserver
          image: maptiler/tileserver-gl:latest
          args:
            - --verbose
            - --port
            - "8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: tileserver-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: tileserver-data
          persistentVolumeClaim:
            claimName: tileserver-data
