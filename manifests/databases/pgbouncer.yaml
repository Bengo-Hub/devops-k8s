---
# PgBouncer — shared connection pooler in front of postgresql.
# Apps keep their existing POSTGRES_URL secret but point host to
# pgbouncer.infra.svc.cluster.local:6432 to multiplex onto ~20 real
# PG connections instead of 100+.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: infra
data:
  pgbouncer.ini: |
    [databases]
    * = host=postgresql.infra.svc.cluster.local port=5432

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = 2000
    default_pool_size = 20
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    server_idle_timeout = 120
    server_lifetime = 1800
    log_connections = 0
    log_disconnections = 0
    ignore_startup_parameters = extra_float_digits,search_path,options
    admin_users = admin_user
---
# userlist.txt is generated at pod start from the postgresql secret.
# We mount the secret and run a tiny init script to write the file.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: infra
  labels:
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      priorityClassName: db-critical
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:v1.25.1-p0
          imagePullPolicy: IfNotPresent
          ports:
            - name: pgbouncer
              containerPort: 6432
          env:
            - name: DB_HOST
              value: postgresql.infra.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: LISTEN_PORT
              value: "6432"
            - name: AUTH_TYPE
              value: scram-sha-256
            - name: POOL_MODE
              value: transaction
            - name: MAX_CLIENT_CONN
              value: "2000"
            - name: DEFAULT_POOL_SIZE
              value: "20"
            - name: DB_USER
              value: admin_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: infra
  labels:
    app: pgbouncer
spec:
  type: ClusterIP
  selector:
    app: pgbouncer
  ports:
    - name: pgbouncer
      port: 6432
      targetPort: 6432
