---
# PgBouncer — shared transaction pooler in front of postgresql.
# Apps update POSTGRES_URL host to pgbouncer.infra.svc.cluster.local:6432.
# Uses auth_query so each service's own postgres user (erp_user,
# inventory_user, ...) is authenticated dynamically — no per-user entry
# in userlist.txt needed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: infra
data:
  pgbouncer.ini: |
    [databases]
    ; auth_dbname forces pgbouncer to run auth_query against 'postgres'
    ; db (where pgbouncer schema lives), regardless of which db the
    ; client is trying to reach.
    ; Per-database pool_size overrides for heavy-traffic services.
    ; Keeps them from starving lighter services and prevents connection exhaustion
    ; on PostgreSQL max_connections=200 (15+ services × pool_size).
    truload = host=postgresql.infra.svc.cluster.local port=5432 dbname=truload auth_dbname=postgres pool_size=20
    ordering = host=postgresql.infra.svc.cluster.local port=5432 dbname=ordering auth_dbname=postgres pool_size=15
    erp = host=postgresql.infra.svc.cluster.local port=5432 dbname=erp auth_dbname=postgres pool_size=20
    auth = host=postgresql.infra.svc.cluster.local port=5432 dbname=auth auth_dbname=postgres pool_size=15
    logistics = host=postgresql.infra.svc.cluster.local port=5432 dbname=logistics auth_dbname=postgres pool_size=10
    notifications = host=postgresql.infra.svc.cluster.local port=5432 dbname=notifications auth_dbname=postgres pool_size=8
    treasury = host=postgresql.infra.svc.cluster.local port=5432 dbname=treasury auth_dbname=postgres pool_size=10
    subscriptions = host=postgresql.infra.svc.cluster.local port=5432 dbname=subscriptions auth_dbname=postgres pool_size=8
    * = host=postgresql.infra.svc.cluster.local port=5432 auth_dbname=postgres

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    unix_socket_dir =

    # Authentication: pgbouncer_auth role looks up SCRAM hashes via a
    # SECURITY DEFINER function in the pgbouncer schema. This means every
    # service user (erp_user, auth_user, ...) authenticates without
    # needing an entry in userlist.txt.
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt
    auth_user = pgbouncer_auth
    auth_query = SELECT uname, phash FROM pgbouncer.user_lookup($1)

    # Transaction-mode pooling. PgBouncer 1.21+ supports server-side
    # prepared statements in transaction mode via max_prepared_statements.
    pool_mode = transaction
    max_client_conn = 3000
    default_pool_size = 10
    reserve_pool_size = 10
    reserve_pool_timeout = 2
    server_idle_timeout = 120
    server_lifetime = 1800
    max_prepared_statements = 100

    # Fast failure on DB outage — prevents services hanging for minutes.
    # server_login_retry: how long to cache failed login before retrying (default 15s).
    # Reduced to 3s so services recover quickly after PostgreSQL restarts.
    server_login_retry = 3
    # query_wait_timeout: max time a query waits for a pool connection (default 120s).
    # Reduced so slow queries fail fast instead of backing up the pool.
    query_wait_timeout = 30
    # server_connect_timeout: max time to wait for a new server connection.
    server_connect_timeout = 10
    # client_idle_timeout: disconnect idle client connections to free pool slots.
    client_idle_timeout = 120

    log_connections = 0
    log_disconnections = 0
    ignore_startup_parameters = extra_float_digits,search_path,options
    admin_users = admin_user,pgbouncer_auth
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: infra
  labels:
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pgbouncer
      annotations:
        checksum/config: "v2-auth-query"
    spec:
      priorityClassName: db-critical
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:v1.25.1-p0
          imagePullPolicy: IfNotPresent
          # Bypass edoburu's entrypoint (it rewrites pgbouncer.ini from env).
          # Run pgbouncer directly with our mounted ConfigMap.
          command: ["/usr/bin/pgbouncer", "/etc/pgbouncer/pgbouncer.ini"]
          ports:
            - name: pgbouncer
              containerPort: 6432
          volumeMounts:
            - name: config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
            - name: userlist
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: pgbouncer-config
        - name: userlist
          secret:
            secretName: pgbouncer-auth-creds
            items:
              - key: userlist.txt
                path: userlist.txt
            defaultMode: 0444
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: infra
  labels:
    app: pgbouncer
spec:
  type: ClusterIP
  selector:
    app: pgbouncer
  ports:
    - name: pgbouncer
      port: 6432
      targetPort: 6432
