---
# PgBouncer — shared transaction pooler in front of postgresql.
# Apps update POSTGRES_URL host to pgbouncer.infra.svc.cluster.local:6432.
# Uses auth_query so each service's own postgres user (erp_user,
# inventory_user, ...) is authenticated dynamically — no per-user entry
# in userlist.txt needed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: infra
data:
  pgbouncer.ini: |
    [databases]
    * = host=postgresql.infra.svc.cluster.local port=5432

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    unix_socket_dir =

    # Authentication: pgbouncer_auth role looks up SCRAM hashes via a
    # SECURITY DEFINER function in the pgbouncer schema. This means every
    # service user (erp_user, auth_user, ...) authenticates without
    # needing an entry in userlist.txt.
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt
    auth_user = pgbouncer_auth
    auth_query = SELECT uname, phash FROM pgbouncer.user_lookup($1)

    # Transaction-mode pooling. PgBouncer 1.21+ supports server-side
    # prepared statements in transaction mode via max_prepared_statements.
    pool_mode = transaction
    max_client_conn = 2000
    default_pool_size = 20
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    server_idle_timeout = 120
    server_lifetime = 1800
    max_prepared_statements = 100

    log_connections = 0
    log_disconnections = 0
    ignore_startup_parameters = extra_float_digits,search_path,options
    admin_users = admin_user,pgbouncer_auth
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: infra
  labels:
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pgbouncer
      annotations:
        checksum/config: "v2-auth-query"
    spec:
      priorityClassName: db-critical
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:v1.25.1-p0
          imagePullPolicy: IfNotPresent
          # Bypass edoburu's entrypoint (it rewrites pgbouncer.ini from env).
          # Run pgbouncer directly with our mounted ConfigMap.
          command: ["/usr/bin/pgbouncer", "/etc/pgbouncer/pgbouncer.ini"]
          ports:
            - name: pgbouncer
              containerPort: 6432
          volumeMounts:
            - name: config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
            - name: userlist
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: pgbouncer-config
        - name: userlist
          secret:
            secretName: pgbouncer-auth-creds
            items:
              - key: userlist.txt
                path: userlist.txt
            defaultMode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: infra
  labels:
    app: pgbouncer
spec:
  type: ClusterIP
  selector:
    app: pgbouncer
  ports:
    - name: pgbouncer
      port: 6432
      targetPort: 6432
