apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: infra
  labels:
    app: postgresql
    component: primary
spec:
  type: ClusterIP
  ports:
    - name: tcp-postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP
  selector:
    app: postgresql
    component: primary
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-hl
  namespace: infra
  labels:
    app: postgresql
    component: primary
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: tcp-postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP
  selector:
    app: postgresql
    component: primary
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-metrics
  namespace: infra
  labels:
    app: postgresql
    component: metrics
spec:
  type: ClusterIP
  ports:
    - name: http-metrics
      port: 9187
      targetPort: http-metrics
      protocol: TCP
  selector:
    app: postgresql
    component: primary
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-configuration
  namespace: infra
data:
  postgresql.conf: |
    # Basic PostgreSQL configuration
    listen_addresses = '*'
    port = 5432
    max_connections = 300
    
    # Include additional configuration files (exclude postgresql.conf to avoid recursion)
    include '/etc/postgresql/conf.d/override.conf'
  override.conf: |
    # PostgreSQL Performance Tuning
    max_connections = 300
    shared_buffers = 3GB  # 25% of 12Gi limit
    effective_cache_size = 9GB  # 75% of 12Gi limit
    work_mem = 32MB
    maintenance_work_mem = 768MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    min_wal_size = 1GB
    max_wal_size = 4GB
    
    # Socket directory (tmp for compatibility)
    unix_socket_directories = '/tmp'
    
    # Logging
    log_timezone = 'UTC'
    log_statement = 'none'
    log_duration = off
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init-scripts
  namespace: infra
data:
  01-create-admin-user.sql: |
    -- Ensure admin_user has superuser privileges
    DO $$
    BEGIN
      IF EXISTS (SELECT FROM pg_user WHERE usename = 'admin_user') THEN
        ALTER USER admin_user WITH SUPERUSER CREATEDB CREATEROLE;
      END IF;
    END
    $$;
  
  02-enable-pgvector.sql: |
    -- Enable pgvector extension
    CREATE EXTENSION IF NOT EXISTS vector;
    GRANT USAGE ON SCHEMA public TO admin_user;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: infra
  labels:
    app: postgresql
    component: primary
spec:
  serviceName: postgresql-hl
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
      component: primary
  template:
    metadata:
      labels:
        app: postgresql
        component: primary
    spec:
      priorityClassName: db-critical
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsNonRoot: true
      # Ensure max_connections=300 in the persisted $PGDATA/postgresql.conf BEFORE postgres starts.
      # The mounted configmap (override.conf=300) is never read because PGDATA's postgresql.conf
      # is authoritative and its `include` was commented out — a plain restart can't change it.
      # This initContainer edits the authoritative file on the PVC so the change is durable.
      initContainers:
      - name: ensure-max-connections
        image: docker.io/codevertex/postgresql-pgvector:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          CONF=/var/lib/postgresql/data/pgdata/postgresql.conf
          if [ -f "$CONF" ]; then
            sed -i 's/^[# ]*max_connections[[:space:]]*=.*/max_connections = 300/' "$CONF"
            echo "ensure-max-connections: set max_connections=300 in $CONF"
            grep -i '^max_connections' "$CONF" || true
          else
            echo "ensure-max-connections: $CONF not present yet (fresh init) — main container will create it"
          fi
        securityContext:
          runAsUser: 999
          runAsNonRoot: true
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      containers:
      - name: postgresql
        image: docker.io/codevertex/postgresql-pgvector:latest
        # IfNotPresent: avoid re-pulling the large pgvector image on every restart (that added
        # ~5-6 min of DB downtime on a roll). Deliberate upgrades should bump the tag/digest.
        imagePullPolicy: IfNotPresent
        ports:
        - name: postgresql
          containerPort: 5432
          protocol: TCP
        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_USER
          value: admin_user
        - name: POSTGRES_DB
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql
              key: password
        - name: POSTGRES_POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql
              key: postgres-password
        resources:
          requests:
            # Right-sized 1000m->300m: actual CPU usage is ~150m; bursts to the 4000m limit.
            cpu: 300m
            memory: 3Gi
          limits:
            cpu: 4000m
            memory: 12Gi
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - exec pg_isready -U admin_user -d postgres -h 127.0.0.1 -p 5432
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - exec pg_isready -U admin_user -d postgres -h 127.0.0.1 -p 5432
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: config
          mountPath: /etc/postgresql/conf.d
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        securityContext:
          runAsUser: 999
          runAsNonRoot: true
      
      - name: metrics
        image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http-metrics
          containerPort: 9187
          protocol: TCP
        env:
        - name: DATA_SOURCE_URI
          value: "127.0.0.1:5432/postgres?sslmode=disable"
        - name: DATA_SOURCE_USER
          value: admin_user
        - name: DATA_SOURCE_PASS
          valueFrom:
            secretKeyRef:
              name: postgresql
              key: password
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: http-metrics
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /
            port: http-metrics
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
      
      volumes:
      - name: config
        configMap:
          name: postgresql-configuration
      - name: init-scripts
        configMap:
          name: postgresql-init-scripts
  
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        app: postgresql
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 20Gi

