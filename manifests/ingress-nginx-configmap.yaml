apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
data:
  allow-snippet-annotations: "true"
  # Auth-API JWTs with 247 permissions produce ~8.5KB tokens.
  # Default 4k/8k buffers cause 502 on cookie-bearing requests (OAuth /authorize)
  # and large response bodies (login/token endpoints).
  proxy-buffer-size: "32k"
  large-client-header-buffers: "4 32k"
  # Compression: the Next.js standalone servers (pos-ui, ordering-frontend, all UIs)
  # ship JS/CSS uncompressed, which is costly over the long RTT to East-Africa clients.
  # The official controller image (v1.8.1) has no brotli module, so use built-in gzip.
  # Compresses every proxied text/JS/CSS/JSON response cluster-wide (~70% smaller).
  use-gzip: "true"
  gzip-level: "6"
  gzip-min-length: "256"
  gzip-types: "application/javascript application/x-javascript application/json application/manifest+json application/xml application/rss+xml application/vnd.ms-fontobject image/svg+xml text/css text/plain text/javascript text/xml"
