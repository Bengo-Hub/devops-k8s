apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
data:
  allow-snippet-annotations: "true"
  # Auth-API JWTs with 247 permissions produce ~8.5KB tokens.
  # Default 4k/8k buffers cause 502 on cookie-bearing requests (OAuth /authorize)
  # and large response bodies (login/token endpoints).
  proxy-buffer-size: "32k"
  large-client-header-buffers: "4 32k"
  # Compression: the Next.js standalone servers (pos-ui, ordering-frontend, all UIs)
  # ship JS/CSS uncompressed, which is costly over the long RTT to East-Africa clients.
  # The official controller image (v1.8.1) has no brotli module, so use built-in gzip.
  # Compresses every proxied text/JS/CSS/JSON response cluster-wide (~70% smaller).
  use-gzip: "true"
  gzip-level: "6"
  gzip-min-length: "256"
  gzip-types: "application/javascript application/x-javascript application/json application/manifest+json application/xml application/rss+xml application/vnd.ms-fontobject image/svg+xml text/css text/plain text/javascript text/xml"
  # ── Cloudflare real client IPs ──────────────────────────────────────────────
  # Restore end-user IPs once codevertexitsolutions.com is proxied through
  # Cloudflare (orange cloud). Only connections FROM Cloudflare's published
  # ranges (proxy-real-ip-cidr) have their CF-Connecting-IP honored — direct
  # traffic keeps its socket IP, so this is inert until the DNS cutover and
  # safe to apply in advance. Ranges: https://www.cloudflare.com/ips/
  use-forwarded-headers: "true"
  forwarded-for-header: "CF-Connecting-IP"
  proxy-real-ip-cidr: "173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"
