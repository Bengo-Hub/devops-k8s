---
# KEDA HTTP scale-to-zero for notifications-ui. First request wakes the pod,
# subsequent requests go straight through.
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: notifications-ui
  namespace: notifications
  labels:
    app: notifications-ui
spec:
  hosts:
    - notifications.codevertexitsolutions.com
  scaleTargetRef:
    name: notifications-ui
    kind: Deployment
    apiVersion: apps/v1
    service: notifications-ui
    port: 80
  replicas:
    min: 0
    max: 2
  scalingMetric:
    requestRate:
      granularity: "1s"
      targetValue: 50
      window: "1m"
---
apiVersion: v1
kind: Service
metadata:
  name: keda-http-interceptor
  namespace: notifications
  labels:
    app: keda-http-bridge
spec:
  type: ExternalName
  externalName: keda-add-ons-http-interceptor-proxy.infra.svc.cluster.local
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notifications-ui
  namespace: notifications
  labels:
    app: notifications-ui
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "90"
spec:
  ingressClassName: nginx
  rules:
    - host: notifications.codevertexitsolutions.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keda-http-interceptor
                port:
                  number: 8080
  tls:
    - hosts:
        - notifications.codevertexitsolutions.com
      secretName: notifications-ui-tls
