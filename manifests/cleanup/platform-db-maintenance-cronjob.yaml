# Platform Database Maintenance CronJob
#
# Runs nightly at 01:00 AM UTC to purge old records across all service databases.
# Uses the admin_user (postgresql secret) to connect directly to each DB.
#
# Cleanup policy:
#   outbox_events (published):  DELETE after 7 days
#   outbox_events (failed):     DELETE after 7 days (failed = exhausted retries, not useful)
#   Logistics telemetry_points: DELETE after 90 days
#   IoT telemetry_data, device_heartbeats, command_history: DELETE after 90 days
#   MarketFlow chat_sessions:   DELETE after 90 days
#   MarketFlow audit_logs:      DELETE after 180 days
#
# Safe by design:
#   - Connects via direct PostgreSQL (not PgBouncer) to avoid transaction-mode limits on DELETE
#   - Uses LIMIT 10000 per run to prevent long-running transactions
#   - set -e aborts the script but continues to next DB on error (each DB in separate psql call)
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: platform-db-maintenance
  namespace: infra
  labels:
    app: platform-db-maintenance
    component: maintenance
spec:
  schedule: "0 1 * * *"  # Daily at 1:00 AM UTC (1 hour before backup at 2am)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 7200
      activeDeadlineSeconds: 1800  # 30 minute max
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: platform-db-maintenance
        spec:
          restartPolicy: Never
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
          containers:
            - name: db-maintenance
              image: postgres:17-alpine
              command:
                - /bin/sh
                - -c
                - |
                  PG="postgresql.infra.svc.cluster.local"
                  CONN_OPTS="-h $PG -U $PGUSER"

                  echo "=== Platform DB Maintenance ($(date -u)) ==="

                  run_sql() {
                    local DB="$1"
                    local LABEL="$2"
                    local SQL="$3"
                    echo ""
                    echo "[$DB] $LABEL"
                    RESULT=$(psql $CONN_OPTS -d "$DB" -At -c "$SQL" 2>&1)
                    RC=$?
                    if [ $RC -eq 0 ]; then
                      echo "  -> $RESULT rows affected"
                    else
                      echo "  -> WARN: $RESULT"
                    fi
                  }

                  # ─────────────────────────────────────────────────────────
                  # OUTBOX EVENT CLEANUP (all service databases)
                  # Delete published events older than 7 days
                  # Delete failed events older than 7 days (exhausted retries)
                  # ─────────────────────────────────────────────────────────
                  OUTBOX_SQL_PUBLISHED="WITH deleted AS (DELETE FROM outbox_events WHERE status = 'published' AND published_at < NOW() - INTERVAL '7 days' RETURNING id) SELECT COUNT(*) FROM deleted;"
                  OUTBOX_SQL_FAILED="WITH deleted AS (DELETE FROM outbox_events WHERE status = 'failed' AND created_at < NOW() - INTERVAL '7 days' RETURNING id) SELECT COUNT(*) FROM deleted;"

                  for DB in auth ordering logistics inventory treasury pos notifications subscriptions projects iot marketflow ticketing; do
                    # Check if outbox_events table exists before running
                    HAS_TABLE=$(psql $CONN_OPTS -d "$DB" -At -c "SELECT 1 FROM information_schema.tables WHERE table_name = 'outbox_events'" 2>/dev/null)
                    if [ "$HAS_TABLE" = "1" ]; then
                      run_sql "$DB" "outbox: delete published >7d" "$OUTBOX_SQL_PUBLISHED"
                      run_sql "$DB" "outbox: delete failed >7d"    "$OUTBOX_SQL_FAILED"
                    fi
                  done

                  # ─────────────────────────────────────────────────────────
                  # LOGISTICS TELEMETRY CLEANUP
                  # GPS tracking data accumulates rapidly during active deliveries
                  # ─────────────────────────────────────────────────────────
                  run_sql "logistics" "telemetry_points >90d" \
                    "WITH deleted AS (DELETE FROM telemetry_points WHERE created_at < NOW() - INTERVAL '90 days' RETURNING id) SELECT COUNT(*) FROM deleted;"

                  # ─────────────────────────────────────────────────────────
                  # IOT TELEMETRY CLEANUP
                  # Device data, heartbeats, and command history
                  # ─────────────────────────────────────────────────────────
                  for TABLE in telemetry_data device_heartbeats command_history; do
                    HAS_TABLE=$(psql $CONN_OPTS -d "iot" -At -c "SELECT 1 FROM information_schema.tables WHERE table_name = '$TABLE'" 2>/dev/null)
                    if [ "$HAS_TABLE" = "1" ]; then
                      run_sql "iot" "$TABLE >90d" \
                        "WITH deleted AS (DELETE FROM $TABLE WHERE created_at < NOW() - INTERVAL '90 days' RETURNING id) SELECT COUNT(*) FROM deleted;"
                    fi
                  done

                  # ─────────────────────────────────────────────────────────
                  # MARKETFLOW DATA CLEANUP
                  # Chat sessions and audit logs grow unboundedly
                  # ─────────────────────────────────────────────────────────
                  run_sql "marketflow" "chat_sessions >90d" \
                    "WITH deleted AS (DELETE FROM chat_sessions WHERE created_at < NOW() - INTERVAL '90 days' RETURNING id) SELECT COUNT(*) FROM deleted;"

                  run_sql "marketflow" "audit_logs >180d" \
                    "WITH deleted AS (DELETE FROM audit_logs WHERE created_at < NOW() - INTERVAL '180 days' RETURNING id) SELECT COUNT(*) FROM deleted;"

                  # ─────────────────────────────────────────────────────────
                  # AUTH SESSION CLEANUP (redundant backup in case CronJob fails)
                  # The dedicated auth-session-cleanup CronJob in the auth namespace
                  # is the primary cleaner. This is a safety net.
                  # ─────────────────────────────────────────────────────────
                  run_sql "auth" "sessions: expired" \
                    "WITH deleted AS (DELETE FROM sessions WHERE expires_at < NOW() RETURNING id) SELECT COUNT(*) FROM deleted;"
                  run_sql "auth" "sessions: revoked" \
                    "WITH deleted AS (DELETE FROM sessions WHERE status = 'revoked' RETURNING id) SELECT COUNT(*) FROM deleted;"

                  echo ""
                  echo "=== Maintenance complete ($(date -u)) ==="
              env:
                - name: PGUSER
                  value: "admin_user"
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql
                      key: admin-user-password
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
