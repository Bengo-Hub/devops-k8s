# Platform Maintenance CronJob
#
# Runs nightly at 01:00 AM UTC. Single Job, two independent containers:
#   1. db-maintenance — purges old records across all service databases.
#   2. image-prune     — removes stale containerd images from the node.
# Kept as one CronJob rather than two so there's a single cleanup job to
# reason about; add future maintenance tasks here as additional containers
# rather than new CronJob resources.
#
# --- db-maintenance ---
# Uses the admin_user (postgresql secret) to connect directly to each DB.
#
# Cleanup policy:
#   outbox_events (PUBLISHED):  DELETE after 7 days (belt-and-braces; shared-events
#                               now prunes on publish, but cleans any legacy rows)
#   outbox_events (FAILED):     DELETE after 7 days (kept briefly for troubleshooting)
#   Logistics telemetry_points: DELETE after 90 days
#   IoT telemetry_data, device_heartbeats, command_history: DELETE after 90 days
#   MarketFlow chat_sessions:   DELETE after 90 days
#   audit_logs (all services):  DELETE after 30 days (1-month retention policy)
#
# NOTE: outbox status filters use UPPER(status) because shared-events writes
# 'PENDING'/'PUBLISHED'/'FAILED' (uppercase). A previous lowercase filter never
# matched, so published/failed rows were never pruned.
#
# Safe by design:
#   - Connects via direct PostgreSQL (not PgBouncer) to avoid transaction-mode limits on DELETE
#   - Uses LIMIT 10000 per run to prevent long-running transactions
#   - set -e aborts the script but continues to next DB on error (each DB in separate psql call)
#
# --- image-prune ---
# Runs `crictl rmi --prune` against the node's containerd, which deletes
# only images with zero containers (running or otherwise) referencing
# them. Safe by construction: a freshly-deployed image can never be
# pruned out from under a live pod — the old image for a given app is
# only removed once every replica has rolled onto the new tag and the
# old ReplicaSet's pods have actually terminated.
#
# Why this exists: images from ~50 app services pinned by commit-hash
# tags accumulate forever otherwise (839 stale images / 288Gi found on
# 2026-07-12 before a one-off manual prune). kubelet's own image GC only
# kicks in reactively at 85% disk usage, which is too late for good
# hygiene. Mounts the node's own crictl binary (a static Go binary, so
# no libc coupling to the container image) and the containerd CRI
# socket; pinned to the node via nodeSelector since this must run once
# per node, not once cluster-wide.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: platform-db-maintenance
  namespace: infra
  labels:
    app: platform-db-maintenance
    component: maintenance
spec:
  schedule: "0 1 * * *"  # Daily at 1:00 AM UTC (1 hour before backup at 2am)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 7200
      activeDeadlineSeconds: 1800  # 30 minute max
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: platform-db-maintenance
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/hostname: mss-prod-master
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
          containers:
            - name: db-maintenance
              image: postgres:17-alpine
              command:
                - /bin/sh
                - -c
                - |
                  PG="postgresql.infra.svc.cluster.local"
                  CONN_OPTS="-h $PG -U $PGUSER"

                  echo "=== Platform DB Maintenance ($(date -u)) ==="

                  run_sql() {
                    local DB="$1"
                    local LABEL="$2"
                    local SQL="$3"
                    echo ""
                    echo "[$DB] $LABEL"
                    RESULT=$(psql $CONN_OPTS -d "$DB" -At -c "$SQL" 2>&1)
                    RC=$?
                    if [ $RC -eq 0 ]; then
                      echo "  -> $RESULT rows affected"
                    else
                      echo "  -> WARN: $RESULT"
                    fi
                  }

                  # ─────────────────────────────────────────────────────────
                  # OUTBOX EVENT CLEANUP (all service databases)
                  # Delete published events older than 7 days
                  # Delete failed events older than 7 days (exhausted retries)
                  # ─────────────────────────────────────────────────────────
                  OUTBOX_SQL_PUBLISHED="WITH deleted AS (DELETE FROM outbox_events WHERE UPPER(status) = 'PUBLISHED' AND published_at < NOW() - INTERVAL '7 days' RETURNING id) SELECT COUNT(*) FROM deleted;"
                  OUTBOX_SQL_FAILED="WITH deleted AS (DELETE FROM outbox_events WHERE UPPER(status) = 'FAILED' AND COALESCE(last_attempt_at, created_at) < NOW() - INTERVAL '7 days' RETURNING id) SELECT COUNT(*) FROM deleted;"

                  for DB in auth ordering logistics inventory treasury pos notifications subscriptions projects marketflow ticketing; do
                    # Check if outbox_events table exists before running
                    HAS_TABLE=$(psql $CONN_OPTS -d "$DB" -At -c "SELECT 1 FROM information_schema.tables WHERE table_name = 'outbox_events'" 2>/dev/null)
                    if [ "$HAS_TABLE" = "1" ]; then
                      run_sql "$DB" "outbox: delete published >7d" "$OUTBOX_SQL_PUBLISHED"
                      run_sql "$DB" "outbox: delete failed >7d"    "$OUTBOX_SQL_FAILED"
                    fi
                  done

                  # ─────────────────────────────────────────────────────────
                  # LOGISTICS TELEMETRY CLEANUP
                  # GPS tracking data accumulates rapidly during active deliveries
                  # ─────────────────────────────────────────────────────────
                  run_sql "logistics" "telemetry_points >90d" \
                    "WITH deleted AS (DELETE FROM telemetry_points WHERE created_at < NOW() - INTERVAL '90 days' RETURNING id) SELECT COUNT(*) FROM deleted;"

                  # ─────────────────────────────────────────────────────────
                  # MARKETFLOW DATA CLEANUP
                  # Chat sessions and audit logs grow unboundedly
                  # ─────────────────────────────────────────────────────────
                  run_sql "marketflow" "chat_sessions >90d" \
                    "WITH deleted AS (DELETE FROM chat_sessions WHERE created_at < NOW() - INTERVAL '90 days' RETURNING id) SELECT COUNT(*) FROM deleted;"

                  # ─────────────────────────────────────────────────────────
                  # AUDIT LOG CLEANUP (all service databases)
                  # 1-month retention policy: audit logs are dropped after 30 days.
                  # ─────────────────────────────────────────────────────────
                  AUDIT_SQL="WITH deleted AS (DELETE FROM audit_logs WHERE created_at < NOW() - INTERVAL '30 days' RETURNING id) SELECT COUNT(*) FROM deleted;"
                  for DB in auth ordering logistics inventory treasury pos notifications subscriptions projects marketflow ticketing; do
                    HAS_TABLE=$(psql $CONN_OPTS -d "$DB" -At -c "SELECT 1 FROM information_schema.tables WHERE table_name = 'audit_logs'" 2>/dev/null)
                    if [ "$HAS_TABLE" = "1" ]; then
                      run_sql "$DB" "audit_logs >30d" "$AUDIT_SQL"
                    fi
                  done

                  # ─────────────────────────────────────────────────────────
                  # AUTH SESSION CLEANUP (redundant backup in case CronJob fails)
                  # The dedicated auth-session-cleanup CronJob in the auth namespace
                  # is the primary cleaner. This is a safety net.
                  # ─────────────────────────────────────────────────────────
                  run_sql "auth" "sessions: expired" \
                    "WITH deleted AS (DELETE FROM sessions WHERE expires_at < NOW() RETURNING id) SELECT COUNT(*) FROM deleted;"
                  run_sql "auth" "sessions: revoked" \
                    "WITH deleted AS (DELETE FROM sessions WHERE status = 'revoked' RETURNING id) SELECT COUNT(*) FROM deleted;"

                  echo ""
                  echo "=== Maintenance complete ($(date -u)) ==="
              env:
                - name: PGUSER
                  value: "admin_user"
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql
                      key: admin-user-password
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
            - name: image-prune
              image: busybox:stable
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                runAsNonRoot: false
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "=== Image prune ($(date -u)) ==="
                  echo "Disk before:"; df -h /host-root
                  echo "Images before:"; /host-crictl images | tail -n +2 | wc -l
                  /host-crictl rmi --prune
                  echo "Images after:"; /host-crictl images | tail -n +2 | wc -l
                  echo "Disk after:"; df -h /host-root
              env:
                - name: CONTAINER_RUNTIME_ENDPOINT
                  value: "unix:///run/containerd/containerd.sock"
                - name: IMAGE_SERVICE_ENDPOINT
                  value: "unix:///run/containerd/containerd.sock"
              volumeMounts:
                - name: crictl-bin
                  mountPath: /host-crictl
                - name: containerd-sock
                  mountPath: /run/containerd/containerd.sock
                - name: root-disk
                  mountPath: /host-root
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
          volumes:
            - name: crictl-bin
              hostPath:
                path: /usr/local/bin/crictl
                type: File
            - name: containerd-sock
              hostPath:
                path: /run/containerd/containerd.sock
                type: Socket
            - name: root-disk
              hostPath:
                path: /
                type: Directory
