---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: db-critical
value: 1000000000
globalDefault: false
description: "Highest priority for stateful data services (PostgreSQL, Redis, PgBouncer)."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: ingress-critical
value: 900000000
globalDefault: false
description: "High priority for cluster ingress + coredns — must not be evicted under pressure."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: platform-high
value: 500000000
globalDefault: false
description: "Platform services (argocd, prometheus, cert-manager) — above app workloads."
