prometheus:
  prometheusSpec:
    # Reduced from 30d to 15d — halves write pressure and disk usage.
    # At current scrape volume, 15d stores ~10-12Gi of metrics (well within 20Gi PVC).
    retention: 15d
    # Scrape every 30s instead of 15s — halves CPU usage (was 721m, target <400m).
    # Non-critical services benefit from reduced scrape frequency.
    scrapeInterval: "30s"
    evaluationInterval: "30s"
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

grafana:
  adminPassword: "<REPLACE_WITH_GRAFANA_PASSWORD>"
  persistence:
    enabled: true
    size: 10Gi
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      # Increased from 512Mi — actual usage is 877Mi which exceeds the old 512Mi limit.
      # Grafana was running over limit due to dashboard caching and plugin state.
      memory: 1536Mi
  # Additional security and performance settings
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
  # Disable initContainers to avoid non-root policy violations
  initChownData:
    enabled: false
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/rewrite-target: /
      # Enable HTTP to HTTPS redirect
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      # Allow ACME challenge path to work with HTTP (for cert-manager validation)
      nginx.ingress.kubernetes.io/configuration-snippet: |
        if ($uri ~ "^/.well-known/acme-challenge/") {
          return 200;
        }
    hosts:
      - grafana.codevertexitsolutions.com
    path: /
    pathType: Prefix
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.codevertexitsolutions.com

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

