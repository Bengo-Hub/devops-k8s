# Daily cluster maintenance CronJob - runs at 3:00 AM UTC
# Cleans up: failed/stuck pods, stale ReplicaSets, completed Jobs,
# old Completed pods, unused container images on the node, and
# Evicted pods across all namespaces. Also reports (list-only,
# no deletion) orphan PVCs that are not mounted by any Pod.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cluster-daily-cleanup
  namespace: kube-system
  labels:
    app: cluster-maintenance
spec:
  schedule: "0 3 * * *"  # Daily at 3:00 AM UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600  # Keep completed job for 1 hour
      activeDeadlineSeconds: 1800    # Kill if running longer than 30 minutes
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: cluster-daily-cleanup
        spec:
          serviceAccountName: cluster-daily-cleanup
          restartPolicy: Never
          # Init container: prune unused container images on the node
          # Requires privileged access to the host via nsenter
          initContainers:
          - name: image-cleanup
            image: alpine:3.20
            command:
            - /bin/sh
            - -c
            - |
              echo "=== Pruning unused container images on node ==="
              BEFORE=$(nsenter --target 1 --mount --uts --ipc --net -- crictl images -q 2>/dev/null | wc -l)
              echo "Images before prune: $BEFORE"
              nsenter --target 1 --mount --uts --ipc --net -- crictl rmi --prune 2>/dev/null || true
              AFTER=$(nsenter --target 1 --mount --uts --ipc --net -- crictl images -q 2>/dev/null | wc -l)
              echo "Images after prune: $AFTER"
              echo "Removed $((BEFORE - AFTER)) unused images"
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
          # Main container: kubectl-based cleanup (optimized with --all-namespaces)
          containers:
          - name: cleanup
            image: alpine/k8s:1.30.0
            command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              echo "======================================"
              echo "  Cluster Daily Cleanup - $(date -u '+%Y-%m-%d %H:%M UTC')"
              echo "======================================"

              # -------------------------------------------------------
              # 1. FAILED PODS (all namespaces)
              # -------------------------------------------------------
              echo ""
              echo "[1/11] Cleaning up Failed pods..."
              kubectl get pods --all-namespaces --field-selector=status.phase=Failed \
                -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}' 2>/dev/null | \
              while read NS POD; do
                [ -z "$NS" ] && continue
                echo "  Deleting $NS/$POD"
                kubectl delete pod "$POD" -n "$NS" --grace-period=0 --force 2>/dev/null || true
              done

              # -------------------------------------------------------
              # 2. IMAGE PULL ERRORS (>10 min old)
              # -------------------------------------------------------
              echo "[2/11] Cleaning up ImagePullBackOff/ErrImagePull pods..."
              kubectl get pods --all-namespaces -o json 2>/dev/null | jq -r '
                .items[] | select(
                  .status.containerStatuses != null and
                  (.status.containerStatuses[].state.waiting.reason // "" |
                    test("ImagePullBackOff|ErrImagePull")) and
                  ((now - (.metadata.creationTimestamp | fromdateiso8601)) > 600)
                ) | "\(.metadata.namespace) \(.metadata.name)"
              ' 2>/dev/null | while read NS POD; do
                [ -z "$NS" ] && continue
                echo "  Deleting $NS/$POD"
                kubectl delete pod "$POD" -n "$NS" --grace-period=0 --force 2>/dev/null || true
              done

              # -------------------------------------------------------
              # 3. CRASHLOOPBACKOFF PODS (>15 min old)
              # -------------------------------------------------------
              echo "[3/11] Cleaning up CrashLoopBackOff pods (>15min)..."
              kubectl get pods --all-namespaces -o json 2>/dev/null | jq -r '
                .items[] | select(
                  .status.containerStatuses != null and
                  (.status.containerStatuses[].state.waiting.reason // "" |
                    test("CrashLoopBackOff")) and
                  ((now - (.metadata.creationTimestamp | fromdateiso8601)) > 900)
                ) | "\(.metadata.namespace) \(.metadata.name)"
              ' 2>/dev/null | while read NS POD; do
                [ -z "$NS" ] && continue
                echo "  Deleting $NS/$POD"
                kubectl delete pod "$POD" -n "$NS" --grace-period=0 --force 2>/dev/null || true
              done

              # -------------------------------------------------------
              # 4. STUCK PENDING / CONTAINERCREATING / CONFIG ERROR (>30 min)
              # -------------------------------------------------------
              echo "[4/11] Cleaning up stuck Pending/ContainerCreating pods (>30min)..."
              kubectl get pods --all-namespaces -o json 2>/dev/null | jq -r '
                .items[] | select(
                  (
                    .status.phase == "Pending" or
                    (.status.containerStatuses // [] | any(
                      .state.waiting.reason // "" |
                      test("ContainerCreating|CreateContainerConfigError")
                    )) or
                    (.status.initContainerStatuses // [] | any(
                      .state.waiting.reason // "" |
                      test("ContainerCreating")
                    ))
                  ) and
                  ((now - (.metadata.creationTimestamp | fromdateiso8601)) > 1800)
                ) | "\(.metadata.namespace) \(.metadata.name)"
              ' 2>/dev/null | while read NS POD; do
                [ -z "$NS" ] && continue
                echo "  Deleting $NS/$POD"
                kubectl delete pod "$POD" -n "$NS" --grace-period=0 --force 2>/dev/null || true
              done

              # -------------------------------------------------------
              # 5. STUCK TERMINATING PODS (>5 min)
              # -------------------------------------------------------
              echo "[5/11] Cleaning up stuck Terminating pods..."
              kubectl get pods --all-namespaces -o json 2>/dev/null | jq -r '
                .items[] | select(
                  .metadata.deletionTimestamp != null and
                  ((now - (.metadata.deletionTimestamp | fromdateiso8601)) > 300)
                ) | "\(.metadata.namespace) \(.metadata.name)"
              ' 2>/dev/null | while read NS POD; do
                [ -z "$NS" ] && continue
                echo "  Force deleting $NS/$POD"
                kubectl patch pod "$POD" -n "$NS" -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
                kubectl delete pod "$POD" -n "$NS" --grace-period=0 --force 2>/dev/null || true
              done

              # -------------------------------------------------------
              # 6. COMPLETED PODS (>1 hour old, all namespaces)
              # -------------------------------------------------------
              echo "[6/11] Cleaning up old Completed pods..."
              kubectl get pods --all-namespaces --field-selector=status.phase=Succeeded \
                -o json 2>/dev/null | jq -r '
                .items[] | select(
                  (now - (.metadata.creationTimestamp | fromdateiso8601)) > 3600
                ) | "\(.metadata.namespace) \(.metadata.name)"
              ' 2>/dev/null | while read NS POD; do
                [ -z "$NS" ] && continue
                echo "  Deleting $NS/$POD"
                kubectl delete pod "$POD" -n "$NS" --grace-period=0 2>/dev/null || true
              done

              # -------------------------------------------------------
              # 7. COMPLETED / FAILED JOBS (>24 hours old)
              # -------------------------------------------------------
              echo "[7/11] Cleaning up old completed/failed Jobs..."
              kubectl get jobs --all-namespaces -o json 2>/dev/null | jq -r '
                .items[] | select(
                  (.status.completionTime != null and
                   ((now - (.status.completionTime | fromdateiso8601)) > 86400))
                  or
                  ((.status.failed // 0) > 0 and
                   .status.completionTime == null and
                   ((now - (.metadata.creationTimestamp | fromdateiso8601)) > 86400))
                  or
                  (.metadata.deletionTimestamp != null and
                   ((now - (.metadata.deletionTimestamp | fromdateiso8601)) > 3600))
                ) | "\(.metadata.namespace) \(.metadata.name)"
              ' 2>/dev/null | while read NS JOB; do
                [ -z "$NS" ] && continue
                echo "  Deleting job $NS/$JOB"
                # Remove finalizers first to prevent hanging on ArgoCD hook-finalizer
                kubectl patch job "$JOB" -n "$NS" -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
                kubectl delete job "$JOB" -n "$NS" --cascade=background --grace-period=0 --wait=false 2>/dev/null || true
              done

              # -------------------------------------------------------
              # 8. STALE REPLICASETS (0 desired, 0 current replicas)
              # Uses awk on tabular output instead of JSON parsing for speed
              # -------------------------------------------------------
              echo "[8/11] Cleaning up stale ReplicaSets (0/0 replicas)..."
              kubectl get rs --all-namespaces --no-headers 2>/dev/null | \
                awk '$3==0 && $4==0 {print $1, $2}' | while read NS RS; do
                [ -z "$NS" ] && continue
                kubectl delete rs "$RS" -n "$NS" --grace-period=0 2>/dev/null || true
              done
              echo "  Cleaned stale ReplicaSets"

              # -------------------------------------------------------
              # 9. STALE ACME HTTP SOLVER PODS (>2 hours)
              # -------------------------------------------------------
              echo "[9/11] Cleaning up stale ACME solver pods (>2h)..."
              kubectl get pods --all-namespaces -l acme.cert-manager.io/http01-solver=true \
                -o json 2>/dev/null | jq -r '
                .items[] | select(
                  (now - (.metadata.creationTimestamp | fromdateiso8601)) > 7200
                ) | "\(.metadata.namespace) \(.metadata.name)"
              ' 2>/dev/null | while read NS POD; do
                [ -z "$NS" ] && continue
                echo "  Deleting stale ACME solver $NS/$POD"
                kubectl delete pod "$POD" -n "$NS" --grace-period=0 2>/dev/null || true
              done

              # -------------------------------------------------------
              # 10. EVICTED PODS (all namespaces)
              # -------------------------------------------------------
              echo "[10/11] Cleaning up Evicted pods..."
              kubectl get pods --all-namespaces -o json 2>/dev/null | jq -r '
                .items[] | select(.status.reason == "Evicted") |
                "\(.metadata.namespace) \(.metadata.name)"
              ' 2>/dev/null | while read NS POD; do
                [ -z "$NS" ] && continue
                echo "  Deleting evicted $NS/$POD"
                kubectl delete pod "$POD" -n "$NS" --grace-period=0 --force 2>/dev/null || true
              done

              # -------------------------------------------------------
              # 11. ORPHAN PVCs (list-only — no deletion)
              # -------------------------------------------------------
              echo "[11/11] Reporting orphan PVCs (no Pod mount)..."
              MOUNTED=$(kubectl get pods --all-namespaces -o json 2>/dev/null | jq -r '
                .items[] | .metadata.namespace as $ns |
                (.spec.volumes // [])[] |
                select(.persistentVolumeClaim != null) |
                "\($ns)/\(.persistentVolumeClaim.claimName)"
              ' 2>/dev/null | sort -u)
              ORPHANS=$(kubectl get pvc --all-namespaces -o json 2>/dev/null | jq -r '
                .items[] | "\(.metadata.namespace)/\(.metadata.name)"
              ' 2>/dev/null | while read PVC; do
                if ! echo "$MOUNTED" | grep -Fxq "$PVC"; then
                  echo "$PVC"
                fi
              done)
              if [ -z "$ORPHANS" ]; then
                echo "  No orphan PVCs found"
              else
                echo "  Orphan PVCs (review manually; NOT auto-deleted):"
                echo "$ORPHANS" | while read PVC; do echo "    - $PVC"; done
              fi

              # -------------------------------------------------------
              # SUMMARY
              # -------------------------------------------------------
              echo ""
              echo "======================================"
              TOTAL_PODS=$(kubectl get pods --all-namespaces --no-headers 2>/dev/null | wc -l)
              RUNNING_PODS=$(kubectl get pods --all-namespaces --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l)
              TOTAL_RS=$(kubectl get rs --all-namespaces --no-headers 2>/dev/null | wc -l)
              TOTAL_JOBS=$(kubectl get jobs --all-namespaces --no-headers 2>/dev/null | wc -l)

              echo "Cleanup complete at $(date -u '+%Y-%m-%d %H:%M UTC')"
              echo "  Pods:        $TOTAL_PODS total ($RUNNING_PODS running)"
              echo "  ReplicaSets: $TOTAL_RS"
              echo "  Jobs:        $TOTAL_JOBS"
              echo "======================================"
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 256Mi
---
# ServiceAccount for cleanup job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-daily-cleanup
  namespace: kube-system
---
# ClusterRole with permissions to manage pods, RS, and jobs across namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-daily-cleanup
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete", "patch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "delete"]
- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get", "list", "delete"]
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list"]
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-daily-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-daily-cleanup
subjects:
- kind: ServiceAccount
  name: cluster-daily-cleanup
  namespace: kube-system
