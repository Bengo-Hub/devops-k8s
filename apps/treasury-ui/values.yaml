nameOverride: treasury-ui
fullnameOverride: treasury-ui
replicaCount: 1
minReadySeconds: 30
image:
  repository: docker.io/codevertex/treasury-ui
  tag: "c03b8fa3"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
healthCheck:
  enabled: true
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
env:
  - name: NEXT_PUBLIC_API_URL
    value: https://booksapi.codevertexitsolutions.com
  - name: NEXT_PUBLIC_SSO_URL
    value: https://sso.codevertexitsolutions.com
  - name: NEXT_PUBLIC_NOTIFICATIONS_URL
    value: https://notifications.codevertexitsolutions.com
  - name: NEXT_PUBLIC_SUBSCRIPTIONS_API_URL
    value: https://pricingapi.codevertexitsolutions.com
  - name: NEXT_PUBLIC_SUBSCRIPTIONS_UI_URL
    value: https://pricing.codevertexitsolutions.com
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
# Chart-managed ingress disabled: traffic is routed via the
# keda-http-interceptor bridge in manifests/keda-http/treasury-ui.yaml
# (scale-to-zero pilot). See docs/keda-scale-to-zero-2026-04-16.md.
ingress:
  enabled: false
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: books.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - books.codevertexitsolutions.com
      secretName: treasury-ui-tls
monitoring:
  enabled: false
serviceMonitor:
  enabled: false
verticalPodAutoscaling:
  enabled: true
  updateMode: "Off"
  minCPU: 50m
  maxCPU: 1000m
  minMemory: 128Mi
  maxMemory: 2Gi
  controlledResources: ["cpu", "memory"]
  controlledValues: RequestsAndLimits
  recommendationMode: true
# KEDA HTTP scale-to-zero pilot (treasury-ui was the first UI rolled over).
# HTTPScaledObject + ExternalName bridge service + ingress routing live in
# manifests/keda-http/treasury-ui.yaml so ArgoCD keeps them in sync.
# This chart-level flag is left disabled; the chart's own ingress template
# is NOT used — the ingress in manifests/keda-http/treasury-ui.yaml routes
# directly to the keda-interceptor bridge.
httpScaledObject:
  enabled: false
