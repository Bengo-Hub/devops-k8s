nameOverride: treasury-api
fullnameOverride: treasury-api
replicaCount: 1 # Optimized for resource-constrained environment
image:
  repository: docker.io/codevertex/treasury-api
  tag: "d6274284"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 4000
  targetPort: 4000
# =====================================================================
# MIGRATIONS AND SEEDING
# =====================================================================
# Migrations and seed are handled by entrypoint.sh on container startup.
migrations:
  enabled: false # Handled by entrypoint.sh (runs treasury-migrate on startup)
seed:
  enabled: false # Handled by entrypoint.sh (runs treasury-seed on startup)
healthCheck:
  enabled: true
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0 # terminate old pod (release NATS push-durable bindings) before new subscribes
    maxUnavailable: 1
env:
  # Standardized Go backend env vars — no service prefix (config.go namespace = "")
  - name: APP_ENV
    value: production
  - name: HTTP_PORT
    value: "4000"
  - name: POSTGRES_URL
    valueFrom:
      secretKeyRef:
        name: treasury-api-secrets
        key: POSTGRES_URL
  # Direct PostgreSQL URL for migrate/seed (bypasses PgBouncer transaction mode)
  - name: POSTGRES_MIGRATE_URL
    valueFrom:
      secretKeyRef:
        name: treasury-api-secrets
        key: POSTGRES_MIGRATE_URL
        optional: true
  # Database connection pool settings (prevent connection exhaustion)
  - name: POSTGRES_MAX_OPEN_CONNS
    value: "8"
  - name: POSTGRES_MAX_IDLE_CONNS
    value: "4"
  - name: POSTGRES_CONN_MAX_LIFETIME
    value: "15m"
  - name: REDIS_ADDR
    value: redis-master.infra.svc.cluster.local:6379
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: treasury-api-secrets
        key: REDIS_PASSWORD
        optional: true
  - name: EVENTS_NATS_URL
    value: "nats://nats.messaging.svc.cluster.local:4222,nats://nats.codevertexitsolutions.com:4222"
  - name: STORAGE_ENDPOINT
    value: http://minio.storage.svc.cluster.local:9000
  - name: STORAGE_BUCKET
    value: treasury-artifacts
  - name: OTLP_ENDPOINT
    value: http://otel-collector.infra.svc.cluster.local:4317
  - name: HTTP_ALLOWED_ORIGINS
    value: "https://books.codevertexitsolutions.com,https://ordersapp.codevertexitsolutions.com,https://accounts.codevertexitsolutions.com,https://sso.codevertexitsolutions.com,https://theurbanloftcafe.com,http://localhost:3000,http://localhost:3001"
  - name: MPESA_CALLBACK_URL
    value: "https://booksapi.codevertexitsolutions.com/api/v1/webhooks/mpesa/callback"
  - name: AUTH_SERVICE_URL
    value: "https://sso.codevertexitsolutions.com"
  - name: AUTH_JWKS_URL
    value: "https://sso.codevertexitsolutions.com/api/v1/.well-known/jwks.json"
  - name: AUTH_ISSUER
    value: "https://sso.codevertexitsolutions.com"
  - name: AUTH_AUDIENCE
    value: "codevertex"
  - name: HTTP_PUBLIC_BASE_URL
    value: "https://booksapi.codevertexitsolutions.com"
  - name: HTTP_UI_BASE_URL
    value: "https://books.codevertexitsolutions.com"
  - name: INVENTORY_API_URL
    value: "http://inventory-api.inventory.svc.cluster.local:4000"
  - name: LOGISTICS_API_URL
    value: "http://logistics-api.logistics.svc.cluster.local:4000"
  - name: MARKETFLOW_API_URL
    value: "http://marketflow-api.marketflow.svc.cluster.local:4000"
  # Pre-shared key for trusted backend-to-backend calls (all services use INTERNAL_SERVICE_KEY).
  - name: INTERNAL_SERVICE_KEY
    valueFrom:
      secretKeyRef:
        name: treasury-api-secrets
        key: INTERNAL_SERVICE_KEY
        optional: true
  # -----------------------------------------------------------------------
  # KRA eTIMS OSCU (Online Sales Control Unit) — fiscal device integration
  # -----------------------------------------------------------------------
  - name: KRA_ETIMS_BASE_URL
    value: "https://etims-api.kra.go.ke/etims-api"
  - name: KRA_ETIMS_API_KEY
    valueFrom:
      secretKeyRef:
        name: treasury-api-secrets
        key: KRA_ETIMS_API_KEY
        optional: true
  - name: KRA_ETIMS_DEVICE_SERIAL
    valueFrom:
      secretKeyRef:
        name: treasury-api-secrets
        key: KRA_ETIMS_DEVICE_SERIAL
        optional: true
  # -----------------------------------------------------------------------
  # KRA GavaConnect API (developer.go.ke) — platform-level OAuth2 credentials
  # -----------------------------------------------------------------------
  - name: KRA_GAVACONNECT_BASE_URL
    value: "https://api.kra.go.ke"
  - name: KRA_GAVACONNECT_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: treasury-api-secrets
        key: KRA_GAVACONNECT_CLIENT_ID
        optional: true
  - name: KRA_GAVACONNECT_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: treasury-api-secrets
        key: KRA_GAVACONNECT_CLIENT_SECRET
        optional: true
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
serviceMonitor:
  enabled: true
  namespace: infra
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # CORS is handled at the application level (HTTP_ALLOWED_ORIGINS env var).
    # Nginx ingress CORS annotations are intentionally omitted to prevent duplicate
    # Access-Control-Allow-Origin headers which cause browser CORS failures.
  hosts:
    - host: booksapi.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - booksapi.codevertexitsolutions.com
      secretName: treasury-api-tls
