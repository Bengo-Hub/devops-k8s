apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda-http
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kedacore.github.io/charts
    chart: keda-add-ons-http
    targetRevision: 0.10.0
    helm:
      values: |
        # Override broken gcr.io/kubebuilder/kube-rbac-proxy default
        # (v0.13.0 was removed when kubebuilder migrated to quay.io).
        images:
          kubeRbacProxy:
            repository: quay.io/brancz/kube-rbac-proxy
            tag: v0.14.4
        # Single replica each on a single-node cluster — chart default
        # of 3 interceptor + 3 external-scaler replicas burned ~1.5 CPU
        # for nothing.
        interceptor:
          replicas:
            min: 1
            max: 1
        scaler:
          replicas: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations
