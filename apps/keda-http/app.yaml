apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda-http
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kedacore.github.io/charts
    chart: keda-add-ons-http
    targetRevision: 0.10.0
    helm:
      values: |
        # Override broken gcr.io/kubebuilder/kube-rbac-proxy default
        # (v0.13.0 was removed when kubebuilder migrated to quay.io).
        images:
          kubeRbacProxy:
            repository: quay.io/brancz/kube-rbac-proxy
            tag: v0.14.4
        # Single replica each on a single-node cluster — chart default
        # of 3 interceptor + 3 external-scaler replicas burned ~1.5 CPU
        # for nothing.
        interceptor:
          replicas:
            min: 1
            max: 1
          # Default KEDA_CONDITION_WAIT_TIMEOUT is 20s — too short for
          # Next.js cold starts (~30-60s). Bumped to 120s so the first
          # request successfully waits for the pod to come up instead of
          # 502-ing.
          additionalEnvVars:
            - name: KEDA_CONDITION_WAIT_TIMEOUT
              value: "120s"
            - name: KEDA_RESPONSE_HEADER_TIMEOUT
              value: "30s"
        scaler:
          replicas: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations
    # The chart doesn't expose an env-override hook, so we patch the
    # interceptor live (KEDA_CONDITION_WAIT_TIMEOUT=120s for Next.js
    # cold starts) and tell ArgoCD to leave env + replicas alone.
    - group: apps
      kind: Deployment
      name: keda-add-ons-http-interceptor
      namespace: infra
      jsonPointers:
        - /spec/replicas
        - /spec/template/spec/containers/0/env
