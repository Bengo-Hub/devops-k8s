nameOverride: erp-ui
fullnameOverride: erp-ui
replicaCount: 2
minReadySeconds: 30
image:
  repository: docker.io/codevertex/erp-ui
  tag: "397ea175"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
# Next.js standalone server serves /healthz (src/app/healthz/route.ts).
healthCheck:
  enabled: true
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
# Runtime env (NEXT_PUBLIC_* are baked at build via Dockerfile ARGs; these are
# kept for any server-side reads and parity with the build args).
env:
  - name: NEXT_PUBLIC_API_URL
    value: https://erpapi.masterspace.co.ke
  - name: NEXT_PUBLIC_SSO_URL
    value: https://sso.codevertexitsolutions.com
  - name: NEXT_PUBLIC_AUTH_API_URL
    value: https://sso.codevertexitsolutions.com
  - name: NEXT_PUBLIC_SUBSCRIPTIONS_API_URL
    value: https://pricingapi.codevertexitsolutions.com
  - name: NEXT_PUBLIC_TREASURY_UI_URL
    value: https://books.codevertexitsolutions.com
  - name: NEXT_PUBLIC_INVENTORY_UI_URL
    value: https://inventory.codevertexitsolutions.com
  - name: NEXT_PUBLIC_POS_UI_URL
    value: https://pos.codevertexitsolutions.com
  - name: NEXT_PUBLIC_ORDERING_UI_URL
    value: https://ordersapp.codevertexitsolutions.com
  - name: NEXT_PUBLIC_SUBSCRIPTIONS_UI_URL
    value: https://pricing.codevertexitsolutions.com
  - name: NEXT_PUBLIC_AUTH_UI_URL
    value: https://accounts.codevertexitsolutions.com
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    # Tenant-specific domain (Masterspace)
    - host: erp.masterspace.co.ke
      paths:
        - path: /
          pathType: Prefix
    # Platform owner domain (CodeVertex)
    - host: erp.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - erp.masterspace.co.ke
      secretName: erp-masterspace-tls
    - hosts:
        - erp.codevertexitsolutions.com
      secretName: erp-codevertex-tls
monitoring:
  enabled: false
serviceMonitor:
  enabled: false
verticalPodAutoscaling:
  enabled: true
  updateMode: "Off"
  minCPU: 50m
  maxCPU: 1000m
  minMemory: 128Mi
  maxMemory: 2Gi
  controlledResources: ["cpu", "memory"]
  controlledValues: RequestsAndLimits
  recommendationMode: true
pdb:
  enabled: true
  minAvailable: 1
