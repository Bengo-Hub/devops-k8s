# Auth Service Production Configuration
nameOverride: auth-api
fullnameOverride: auth-api
# ============================================================================
# IMAGE CONFIGURATION
# ============================================================================
image:
  repository: docker.io/codevertex/auth-api
  tag: "090188ff"
  pullPolicy: Always # Force pull to get latest changes
  pullSecrets:
    - name: registry-credentials
# ============================================================================
# REPLICA AND SCALING CONFIGURATION
# ============================================================================
replicaCount: 1
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2 # Critical service - reduced to prevent pod limit overflow
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75
# ============================================================================
# SERVICE CONFIGURATION
# ============================================================================
service:
  type: ClusterIP
  port: 4000
  targetPort: 4000
# ============================================================================
# DEPLOYMENT STRATEGY
# ============================================================================
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
minReadySeconds: 60
progressDeadlineSeconds: 1200 # 20 minutes for migrations and startup
# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
env:
  - name: APP_ENV
    value: production
  - name: HTTP_PORT
    value: "4000"
  # Frontend UI URL for OAuth redirects
  - name: AUTH_UI_URL
    value: "https://accounts.codevertexitsolutions.com"
  # Database connection — config.go DatabaseConfig expects POSTGRES_* (envPrefix:"")
  - name: POSTGRES_URL
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: POSTGRES_URL
  # Migrations run via entrypoint.sh (auth-migrate), not the server; keep false here
  - name: POSTGRES_RUN_MIGRATIONS
    value: "false"
  # Database connection pool settings (prevent connection exhaustion)
  - name: POSTGRES_MAX_OPEN_CONNS
    value: "8" # Reduced to fit within shared PG max_connections=100 budget
  - name: POSTGRES_MAX_IDLE_CONNS
    value: "3" # Reduced from default 5
  - name: POSTGRES_CONN_MAX_LIFETIME
    value: "15m"
  # Redis connection — config.go RedisConfig expects REDIS_* (envPrefix:"REDIS_")
  - name: REDIS_ADDR
    value: redis-master.infra.svc.cluster.local:6379
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: REDIS_PASSWORD
        optional: true
  # NATS Events (EventsConfig expects AUTH_EVENTS_* prefix via caarlos0/env)
  - name: AUTH_EVENTS_NATS_URL
    value: "nats://nats.messaging.svc.cluster.local:4222,nats://nats.codevertexitsolutions.com:4222"
  - name: AUTH_EVENTS_ENABLED
    value: "true"
  # JWT Token Keys (RSA keys for token signing/verification)
  - name: AUTH_TOKEN_PRIVATE_KEY_PATH
    value: /etc/auth-keys/private.pem
  - name: AUTH_TOKEN_PUBLIC_KEY_PATH
    value: /etc/auth-keys/public.pem
  # Token issuer and audience for JWT
  - name: AUTH_TOKEN_ISSUER
    value: "https://sso.codevertexitsolutions.com"
  - name: AUTH_TOKEN_AUDIENCE
    value: "codevertex"
  # OAuth State Secret (for CSRF protection)
  - name: AUTH_SECURITY_OAUTH_STATE_SECRET
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: OAUTH_STATE_SECRET
        optional: true
  # Google OAuth Provider (optional: true allows deployment without OAuth configured)
  - name: AUTH_PROVIDERS_GOOGLE_ENABLED
    value: "true"
  - name: AUTH_PROVIDERS_GOOGLE_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: GOOGLE_CLIENT_ID
        optional: true
  - name: AUTH_PROVIDERS_GOOGLE_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: GOOGLE_CLIENT_SECRET
        optional: true
  - name: AUTH_PROVIDERS_GOOGLE_REDIRECT_URL
    value: "https://sso.codevertexitsolutions.com/api/v1/auth/oauth/google/callback"
  # GitHub OAuth Provider (optional: true allows deployment without OAuth configured)
  # Uses GIT_APP_ID/GIT_APP_SECRET to match local dev variable names
  - name: AUTH_PROVIDERS_GITHUB_ENABLED
    value: "true"
  - name: AUTH_PROVIDERS_GITHUB_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: GIT_APP_ID
        optional: true
  - name: AUTH_PROVIDERS_GITHUB_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: GIT_APP_SECRET
        optional: true
  - name: AUTH_PROVIDERS_GITHUB_REDIRECT_URL
    value: "https://sso.codevertexitsolutions.com/api/v1/auth/oauth/github/callback"
  # Microsoft OAuth Provider (disabled until credentials are configured)
  - name: AUTH_PROVIDERS_MICROSOFT_ENABLED
    value: "false"
  - name: AUTH_PROVIDERS_MICROSOFT_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: MICROSOFT_CLIENT_ID
        optional: true
  - name: AUTH_PROVIDERS_MICROSOFT_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: MICROSOFT_CLIENT_SECRET
        optional: true
  - name: AUTH_PROVIDERS_MICROSOFT_TENANT_ID
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: MICROSOFT_TENANT_ID
        optional: true
  - name: AUTH_PROVIDERS_MICROSOFT_REDIRECT_URL
    value: "https://sso.codevertexitsolutions.com/api/v1/auth/oauth/microsoft/callback"
  # Subscription Service Integration — JWT enrichment with plan/features/limits
  - name: AUTH_SUBSCRIPTION_ENABLED
    value: "true"
  - name: AUTH_SUBSCRIPTION_BASE_URL
    value: "http://subscription-api.subscriptions.svc.cluster.local:4000"
  - name: AUTH_SUBSCRIPTION_TIMEOUT
    value: "5s"
  - name: AUTH_SUBSCRIPTION_API_KEY
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: PLATFORM_API_KEY
        optional: true
  # Seed env vars — auth-seed runs inside entrypoint.sh on every pod startup
  - name: SEED_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: SEED_ADMIN_PASSWORD
        optional: true
  - name: SEED_ADMIN_EMAIL
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: SEED_ADMIN_EMAIL
        optional: true
  - name: DEFAULT_TENANT_SLUG
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: DEFAULT_TENANT_SLUG
        optional: true
  - name: PLATFORM_API_KEY
    valueFrom:
      secretKeyRef:
        name: auth-api-secrets
        key: PLATFORM_API_KEY
        optional: true
# ============================================================================
# DATABASE SETUP, MIGRATIONS AND SEEDING
# ============================================================================
# Standardized Go service startup approach:
#   1. setupDB: Pre-install Helm hook — creates the database if missing
#   2. Entrypoint: Pod startup runs auth-migrate → auth-seed → auth (server)
#      Migrations and seeding are INBUILT and run on every pod start (idempotent)
# External migration/seed hooks are DISABLED — all logic is self-contained in entrypoint.sh

# Setup database if it doesn't exist (must run before migrations)
setupDB:
  enabled: true
  binaryName: auth-setup-db
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
# Create database schema via Ent migrations
# Disabled: entrypoint.sh runs auth-migrate on every pod startup (self-contained)
migrations:
  enabled: false
  binaryName: auth-migrate
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
# Seed initial data (tenants, demo user, admin user)
# Disabled: entrypoint.sh runs auth-seed on every pod startup (idempotent, self-contained)
seed:
  enabled: false
  binaryName: auth-seed
  env:
    - name: SEED_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: auth-api-secrets
          key: SEED_ADMIN_PASSWORD
          optional: true
    # If set, seed uses this as the platform API key instead of generating one
    - name: PLATFORM_API_KEY
      valueFrom:
        secretKeyRef:
          name: auth-api-secrets
          key: PLATFORM_API_KEY
          optional: true
    - name: SEED_ADMIN_EMAIL
      valueFrom:
        secretKeyRef:
          name: auth-api-secrets
          key: SEED_ADMIN_EMAIL
          optional: true
    - name: DEFAULT_TENANT_SLUG
      valueFrom:
        secretKeyRef:
          name: auth-api-secrets
          key: DEFAULT_TENANT_SLUG
          optional: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
# ============================================================================
# VOLUME MOUNTS FOR JWT KEYS
# ============================================================================
volumeMounts:
  - name: auth-token-keys
    mountPath: /etc/auth-keys
    readOnly: true
volumes:
  - name: auth-token-keys
    secret:
      secretName: auth-token-keys
      defaultMode: 288 # 0440 in octal = 288 decimal: readable by owner (root) and group (1000 via fsGroup)
# ============================================================================
# RESOURCE LIMITS AND REQUESTS
# ============================================================================
resources:
  requests:
    cpu: 150m # Balanced for 12-core server - critical service
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
# ============================================================================
# HEALTH CHECKS
# ============================================================================
healthCheck:
  enabled: true
  startup:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 60 # 10 minutes total for startup
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5
# ============================================================================
# INGRESS CONFIGURATION
# ============================================================================
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Proxy buffer sizing — admin JWTs with 247 permissions produce ~15KB responses
    nginx.ingress.kubernetes.io/proxy-buffer-size: "32k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    # Rate limiting for auth endpoints
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "100"
  hosts:
    - host: sso.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - sso.codevertexitsolutions.com
      secretName: sso-codevertexitsolutions-tls
# ============================================================================
# MONITORING AND OBSERVABILITY
# ============================================================================
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
serviceMonitor:
  enabled: true
  namespace: infra
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus
# ============================================================================
# SECURITY CONFIGURATION
# ============================================================================
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  runAsNonRoot: true
# ============================================================================
# POD DISRUPTION BUDGET
# ============================================================================
pdb:
  enabled: true
  minAvailable: 1
# ============================================================================
# POD AFFINITY - DISTRIBUTE PODS ACROSS NODES
# ============================================================================
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - auth-api
          topologyKey: kubernetes.io/hostname
