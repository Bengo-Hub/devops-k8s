nameOverride: pos-ui
fullnameOverride: pos-ui
# Baseline used only when autoscaling is disabled; HPA (below) governs live replicas.
replicaCount: 2
minReadySeconds: 30
image:
  repository: docker.io/codevertex/pos-ui
  tag: "bfa1b174"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
healthCheck:
  enabled: true
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
env:
  - name: NEXT_PUBLIC_API_URL
    value: https://posapi.codevertexitsolutions.com
  - name: NEXT_PUBLIC_NOTIFICATIONS_URL
    value: https://notifications.codevertexitsolutions.com
  - name: NEXT_PUBLIC_SUBSCRIPTIONS_API_URL
    value: https://pricingapi.codevertexitsolutions.com
  - name: NEXT_PUBLIC_SUBSCRIPTIONS_UI_URL
    value: https://pricing.codevertexitsolutions.com
  - name: NEXT_PUBLIC_TREASURY_API_URL
    value: https://booksapi.codevertexitsolutions.com
  - name: NEXT_PUBLIC_TREASURY_UI_URL
    value: https://books.codevertexitsolutions.com
  - name: NEXT_PUBLIC_MAPBOX_TOKEN
    valueFrom:
      secretKeyRef:
        name: pos-ui-secrets
        key: mapboxToken
        optional: true
  - name: NEXT_PUBLIC_SENTRY_DSN
    valueFrom:
      secretKeyRef:
        name: pos-ui-secrets
        key: sentryDsn
        optional: true
  - name: INTERNAL_SERVICE_KEY
    valueFrom:
      secretKeyRef:
        name: pos-ui-secrets
        key: internalServiceKey
        optional: false
# Next.js SSR/RSC server: a single 500m/256Mi pod throttles under concurrent
# terminals and cold-starts slowly on deploy. Raised headroom + HA via HPA.
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: pos.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - pos.codevertexitsolutions.com
      secretName: pos-ui-tls
monitoring:
  enabled: false
serviceMonitor:
  enabled: false
# VPA configuration for UI - recommendation-only mode
verticalPodAutoscaling:
  enabled: true
  updateMode: "Off"
  minCPU: 50m
  maxCPU: 1000m
  minMemory: 128Mi
  maxMemory: 2Gi
  controlledResources: ["cpu", "memory"]
  controlledValues: RequestsAndLimits
  recommendationMode: true
pdb:
  enabled: true
  minAvailable: 1
