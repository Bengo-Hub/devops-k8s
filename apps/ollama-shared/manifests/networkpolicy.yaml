apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-ingress
  namespace: shared-infra
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: marketflow
        - namespaceSelector:
            matchLabels:
              name: truload
        - namespaceSelector:
            matchLabels:
              name: marketflow-worker
        - namespaceSelector:
            matchLabels:
              name: shared-infra
      ports:
        - port: 11434
          protocol: TCP
