apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
  namespace: shared-infra
  labels:
    app: ollama
    tier: shared
spec:
  serviceName: ollama
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        tier: shared
    spec:
      # Init container pulls both models on first deploy:
      #  - nomic-embed-text: embeddings for marketflow-ai RAG (768 dim)
      #  - llama3.1:8b:      tool-calling LLM for truload-backend text-to-SQL
      initContainers:
        - name: pull-models
          image: ollama/ollama:latest
          command:
            - sh
            - -c
            - |
              ollama serve &
              SERVER_PID=$!
              sleep 5
              echo "Pulling nomic-embed-text (~274MB)..."
              ollama pull nomic-embed-text
              echo "Pulling llama3.1:8b (~4.7GB)..."
              ollama pull llama3.1:8b
              echo "Model pulls complete."
              kill $SERVER_PID 2>/dev/null || true
              wait $SERVER_PID 2>/dev/null || true
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 4Gi
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_ORIGINS
              value: "*"
            - name: OLLAMA_NUM_PARALLEL
              value: "2"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "2"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "1"
              memory: 6Gi
            limits:
              cpu: "3"
              memory: 10Gi
          readinessProbe:
            httpGet:
              path: /api/version
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/version
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: ollama-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 20Gi
