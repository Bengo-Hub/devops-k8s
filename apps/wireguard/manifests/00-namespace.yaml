apiVersion: v1
kind: Namespace
metadata:
  name: vpn
  labels:
    app.kubernetes.io/part-of: codevertex-vpn
    # Allow privileged pods (NET_ADMIN/SYS_MODULE + hostPort) under PodSecurity.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
