nameOverride: ticketing-api
fullnameOverride: ticketing-api
replicaCount: 1
image:
  repository: docker.io/codevertex/ticketing-api
  tag: "f1933eb6"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 4009
  targetPort: 4009
migrations:
  enabled: false
seed:
  enabled: false
envFromSecret: ticketing-api-secrets
healthCheck:
  enabled: true
  readiness:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 20
strategy:
  type: RollingUpdate
env:
  # Common keys (same as all Go backends): POSTGRES_URL, REDIS_ADDR, REDIS_PASSWORD
  - name: APP_ENV
    value: production
  - name: HTTP_PORT
    value: "4009"
  - name: POSTGRES_URL
    valueFrom:
      secretKeyRef:
        name: ticketing-api-secrets
        key: POSTGRES_URL
  # Direct PostgreSQL URL for migrate/seed (bypasses PgBouncer transaction mode)
  - name: POSTGRES_MIGRATE_URL
    valueFrom:
      secretKeyRef:
        name: ticketing-api-secrets
        key: POSTGRES_MIGRATE_URL
        optional: true
  # Database connection pool settings (prevent connection exhaustion)
  - name: POSTGRES_MAX_OPEN_CONNS
    value: "6"
  - name: POSTGRES_MAX_IDLE_CONNS
    value: "3"
  - name: POSTGRES_CONN_MAX_LIFETIME
    value: "15m"
  - name: REDIS_ADDR
    value: redis-master.infra.svc.cluster.local:6379
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: ticketing-api-secrets
        key: REDIS_PASSWORD
        optional: true
  # NATS - standard key EVENTS_NATS_URL
  - name: EVENTS_NATS_URL
    value: "nats://nats.messaging.svc.cluster.local:4222,nats://nats.codevertexitsolutions.com:4222"
  - name: OTLP_ENDPOINT
    value: http://otel-collector.infra.svc.cluster.local:4317
  # Auth service (JWT validation, JWKS, OTP)
  - name: AUTH_SERVICE_URL
    value: https://sso.codevertexitsolutions.com
  - name: AUTH_ISSUER
    value: bengobox-auth
  - name: AUTH_AUDIENCE
    value: bengobox-ticketing
  # Notifications S2S
  - name: NOTIFICATIONS_SERVICE_URL
    value: http://notifications-api.notifications.svc.cluster.local:4003
  # Shared S2S key (single key for all internal service calls)
  - name: INTERNAL_SERVICE_KEY
    valueFrom:
      secretKeyRef:
        name: ticketing-api-secrets
        key: INTERNAL_SERVICE_KEY
  # CORS allowed origins
  - name: HTTP_ALLOWED_ORIGINS
    value: "https://ticketing.codevertexitsolutions.com,https://accounts.codevertexitsolutions.com,https://sso.codevertexitsolutions.com,http://localhost:3000,http://localhost:3009"
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
serviceMonitor:
  enabled: true
  namespace: infra
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://ticketing.codevertexitsolutions.com, https://accounts.codevertexitsolutions.com, https://sso.codevertexitsolutions.com, http://localhost:3000, http://localhost:3001"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Accept, Authorization, Content-Type, X-Request-ID, X-Tenant-ID, X-API-Key, X-OTP-Token"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "300"
  hosts:
    - host: ticketingapi.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - ticketingapi.codevertexitsolutions.com
      secretName: ticketing-api-tls
