image:
  repository: docker.io/codevertex/truload-frontend
  tag: "5c391737"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  port: 80
  targetPort: 3000
# Health check configuration for Next.js
healthCheck:
  enabled: true
  readiness:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5
  liveness:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 40
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 5
# Production resource limits for Next.js
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
# Horizontal autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # SSL redirect enabled - cert-manager creates separate solver ingress for ACME
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    # Axle load enforcement test domain (KuraWeigh — road authority use case)
    - host: kuraweightest.masterspace.co.ke
      paths:
        - path: /
          pathType: Prefix
    # Commercial weighing tenant domain (truload.codevertexitsolutions.com)
    - host: truload.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
          # Example: enforcement tenant with custom domain (add one entry per customer)
          # - host: kura-weigh.ntsa.go.ke
          #   paths:
          #     - path: /
          #       pathType: Prefix
  tls:
    # Axle load enforcement test TLS
    - hosts:
        - kuraweightest.masterspace.co.ke
      secretName: kuraweigh-frontend-tls
    # Commercial tenant TLS (cert-manager auto-issues)
    - hosts:
        - truload.codevertexitsolutions.com
      secretName: truload-frontend-tls
      # Example: enforcement tenant custom domain TLS
      # - hosts:
      #     - kura-weigh.ntsa.go.ke
      #   secretName: kura-weigh-ntsa-tls
envFromSecret: truload-frontend-env
env:
  # SSO / OAuth — central auth service for commercial weighing tenants
  - name: NEXT_PUBLIC_AUTH_API_URL
    value: https://sso.codevertexitsolutions.com
  - name: NEXT_PUBLIC_SSO_CLIENT_ID
    value: truload-ui
  - name: NEXT_PUBLIC_APP_URL
    value: https://truload.codevertexitsolutions.com
# No migrations needed for Next.js frontend
migrations:
  enabled: false
# No persistence needed for frontend
persistence:
  enabled: false
# VPA configuration for UI - recommendation-only mode
verticalPodAutoscaling:
  enabled: true
  updateMode: "Off"
  minCPU: 50m
  maxCPU: 500m
  minMemory: 96Mi
  maxMemory: 512Mi
  controlledResources: ["cpu", "memory"]
  controlledValues: RequestsAndLimits
  recommendationMode: true
# No Celery for Next.js frontend
celeryWorker:
  enabled: false
celeryBeat:
  enabled: false
# Monitoring configuration - disable for frontend (no metrics endpoint)
monitoring:
  enabled: false
serviceMonitor:
  enabled: false
