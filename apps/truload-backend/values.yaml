nameOverride: truload-backend
fullnameOverride: truload-backend
image:
  repository: docker.io/codevertex/truload-backend
  tag: 9937447d
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  port: 80
  targetPort: 4000
# Health check configuration for .NET API
# Note: This app runs EF Core migrations and seeding on startup, so we need generous timeouts
healthCheck:
  enabled: true
  startup:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 60 # 10 minutes total for migrations and seeding
  readiness:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3
  liveness:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 10
    failureThreshold: 5
# Production resource limits for .NET API
# Weighing workflows (station load, tolerance lookup, weight capture) require consistent
# CPU without throttling. 2 CPU limit gives headroom for concurrent weighing sessions.
resources:
  requests:
    cpu: 300m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi
# Horizontal autoscaling — scale faster (min 2 always warm, max 4)
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 75
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # SSL redirect enabled - cert-manager creates separate solver ingress for ACME
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # CORS: allow frontend origins (see shared-docs/devops-k8s-ingress-cors.md)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://truload.codevertexitsolutions.com, https://kuraweightest.masterspace.co.ke, https://accounts.codevertexitsolutions.com, https://sso.codevertexitsolutions.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Accept, Authorization, Content-Type, X-Tenant-ID, X-Tenant-Slug, X-Org-ID, X-Station-ID, X-Request-ID"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "300"
  hosts:
    # Axle load enforcement test domain (KuraWeigh API — road authority use case)
    - host: kuraweighapitest.masterspace.co.ke
      paths:
        - path: /
          pathType: Prefix
    # Production backend domain (serves all tenants — commercial and enforcement)
    - host: truloadapi.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - kuraweighapitest.masterspace.co.ke
      secretName: kuraweigh-api-tls
    - hosts:
        - truloadapi.codevertexitsolutions.com
      secretName: truload-api-tls
envFromSecret: truload-backend-env
# Additional environment variables (non-secret config)
# Sensitive values (JWT secrets, service tokens) must go in truload-backend-env secret, not here.
env:
  # Auth-api JWKS URL for SSO token validation (commercial tenants)
  - name: Auth__JwksUrl
    value: "https://sso.codevertexitsolutions.com/.well-known/jwks.json"
  - name: Auth__SsoIssuer
    value: "https://sso.codevertexitsolutions.com"
  # Treasury-api base URL (commercial tenant payments)
  - name: Treasury__ApiUrl
    value: "http://treasury-api.treasury.svc.cluster.local:8080"
  # Subscriptions-api base URL (commercial tenant subscription checks)
  - name: Subscriptions__ApiUrl
    value: "http://subscriptions-api.subscriptions.svc.cluster.local:8080"
  # Database connection pool settings (prevent connection exhaustion on shared PG max_connections=200)
  # Npgsql defaults to MaxPoolSize=100 which is far too high for shared PostgreSQL.
  - name: Database__MaxPoolSize
    value: "6"
  - name: Database__MinPoolSize
    value: "2"
  - name: Database__ConnectionIdleLifetime
    value: "60"
  # CORS: frontend origins allowed to call this API
  # kuraweightest = axle load enforcement test (road authority), truload = commercial weighing tenants
  # Add enforcement tenant custom frontend domains here as they are onboarded
  - name: CORS__AllowedOrigins
    value: "https://kuraweightest.masterspace.co.ke,https://truload.codevertexitsolutions.com,https://accounts.codevertexitsolutions.com,https://sso.codevertexitsolutions.com"
    # Secrets below MUST be added to truload-backend-env Kubernetes secret, not here:
    #   Auth__JwksUrl (if using env-based override)
    #   Treasury__ServiceJwt        — service-to-service JWT for treasury-api
    #   Subscriptions__ServiceJwt   — service-to-service JWT for subscriptions-api
    #   Treasury__WebhookSecret     — HMAC secret for treasury webhook verification
# ============================================================================
# MIGRATIONS AND SEEDING
# ============================================================================
# Migrations are applied at application startup via db.Database.Migrate() in
# Program.cs, using a direct PostgreSQL connection (bypassing PgBouncer).
# The Helm pre-install/pre-upgrade migration Job is disabled — it is not needed.
migrations:
  enabled: false
seed:
  enabled: false
# Pod securityContext so media and backup PVCs are writable by app (uid 1001 in Dockerfile)
securityContext:
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  runAsNonRoot: true
# Persistent storage for file uploads (media, backups)
persistence:
  enabled: true
  size: 10Gi
  mountPath: /app/uploads
  accessMode: ReadWriteOnce
  storageClass: local-path
# Extra PVCs to create via the Helm chart (auto-synced by ArgoCD)
extraPersistentVolumeClaims:
  - name: truload-backups
    size: 20Gi
    accessMode: ReadWriteOnce
    storageClass: local-path
    component: backup
# Additional volume mounts for backup storage
volumeMounts:
  - name: backup-storage
    mountPath: /app/backups/truload
volumes:
  - name: backup-storage
    persistentVolumeClaim:
      claimName: truload-backups
# Init containers for backup directory permissions
initContainers:
  - name: init-backup-dir
    image: busybox:1.36
    command: ['sh', '-c']
    args:
      - |
        echo "Initializing backup directory: /app/backups/truload"
        mkdir -p /app/backups/truload
        chmod -R 775 /app/backups/truload 2>/dev/null || true
        if [ -w "/app/backups/truload" ]; then
          echo "Backup directory is writable"
        else
          echo "Warning: Backup directory may not be writable"
          ls -la /app/backups/truload || true
        fi
    volumeMounts:
      - name: backup-storage
        mountPath: /app/backups/truload
    securityContext:
      runAsUser: 1001
      runAsGroup: 1001
# VPA configuration - DISABLED due to metrics-server issues causing eviction loop
verticalPodAutoscaling:
  enabled: false
  updateMode: "Off"
  minCPU: 200m
  maxCPU: 1000m
  minMemory: 256Mi
  maxMemory: 2Gi
  controlledResources: ["cpu", "memory"]
  controlledValues: RequestsAndLimits
  recommendationMode: false
# No Celery for .NET app
celeryWorker:
  enabled: false
celeryBeat:
  enabled: false
# Disable ServiceMonitor - monitoring namespace not available
serviceMonitor:
  enabled: false
