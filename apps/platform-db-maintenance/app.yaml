apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-db-maintenance
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"  # After all app services are deployed
spec:
  project: default
  source:
    repoURL: https://github.com/Bengo-Hub/devops-k8s.git
    targetRevision: main
    path: manifests/cleanup
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
