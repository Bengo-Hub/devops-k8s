nameOverride: erp-api
fullnameOverride: erp-api
replicaCount: 1
minReadySeconds: 30
image:
  repository: docker.io/codevertex/erp-api
  tag: "18948e6c"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 80
  targetPort: 4000
# ============================================================================
# MIGRATIONS AND SEEDING
# ============================================================================
# Go ERP: Ent (Atlas) migrations + RBAC seed are applied OUT-OF-BAND by the
# repo build.sh (idempotent one-off Jobs against the existing bengo_erp DB /
# `erp` schema). The Go server does NOT auto-migrate in prod. Django-era init
# containers (migrations/seed) are therefore disabled here.
migrations:
  enabled: false # Go: handled idempotently by build.sh (cmd/migrate, schema erp)
seed:
  enabled: false # Go: handled idempotently by build.sh (cmd/seed, RBAC upsert)
# Strategy for zero-downtime updates
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
# Pod security context: the erp-api Go (alpine) image ships non-root user "app" = uid 100/gid 101.
# Must specify a NUMERIC runAsUser (matching inventory-api) — runAsNonRoot:true alone fails with
# "image has non-numeric user (app), cannot verify user is non-root".
securityContext:
  runAsUser: 100
  runAsGroup: 101
  fsGroup: 101
# ============================================================================
# HEALTH CHECKS (Go server: /healthz liveness, /readyz readiness)
# ============================================================================
# No migration waits — the Go binary starts in seconds (migrations run as
# separate one-off Jobs, not in the pod).
healthCheck:
  enabled: true
  startup:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 30 # ~155s budget for cold start / DB connect
  readiness:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 5
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 768Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Large file uploads for documents, receipts, etc.
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Edge rate limiting (outer guard; the app also enforces per-tenant/per-endpoint limits
    # via Redis). Matches the peer services (auth 20/100, ordering 50/200).
    nginx.ingress.kubernetes.io/limit-rps: "30"
    nginx.ingress.kubernetes.io/limit-connections: "150"
  hosts:
    # Tenant-specific domain (Masterspace)
    - host: erpapi.masterspace.co.ke
      paths:
        - path: /
          pathType: Prefix
    # Platform owner domain (CodeVertex)
    - host: erpapi.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - erpapi.masterspace.co.ke
      secretName: erpapi-masterspace-tls
    - hosts:
        - erpapi.codevertexitsolutions.com
      secretName: erpapi-codevertex-tls
# Load standardized keys (POSTGRES_URL, INTERNAL_SERVICE_KEY, REDIS_URL, etc.)
# from the pre-existing erp-api-env secret.
envFromSecret: erp-api-env
# ServiceMonitor / monitoring (Prometheus Operator CRDs not installed)
serviceMonitor:
  enabled: false
monitoring:
  enabled: false
# Persistent storage for media uploads
persistence:
  enabled: true
  size: 20Gi
  mountPath: /app/media
  accessMode: ReadWriteOnce
  storageClass: local-path
# ============================================================================
# ENVIRONMENT VARIABLES (Go config; namespace = "" so no service prefix)
# ============================================================================
# POSTGRES_URL + INTERNAL_SERVICE_KEY + REDIS_URL come from the erp-api-env
# secret (envFromSecret above). The Go config appends search_path=erp via
# DB_SCHEMA — DB creds are never hardcoded here.
env:
  - name: APP_ENV
    value: production
  - name: HTTP_PORT
    value: "4000"
  # Connect DIRECTLY to postgresql (NOT pgbouncer): pgbouncer transaction pooling resets the
  # per-session search_path (breaks the erp schema) + breaks prepared statements. DB_USER/
  # DB_PASSWORD/DB_NAME come from the erp-api-env secret (envFromSecret); we only override the host.
  - name: DB_HOST
    value: "postgresql.infra.svc.cluster.local"
  - name: DB_PORT
    value: "5432"
  - name: REDIS_ADDR
    value: "redis-master.infra.svc.cluster.local:6379"
  - name: MEDIA_ROOT
    value: "/app/media"
  # ── NATS events: the Go server runs the outbox poller + JetStream consumers in-process ──
  - name: EVENTS_ENABLED
    value: "true"
  - name: EVENTS_SOURCE_SERVICE
    value: "erp"
  - name: EVENTS_NATS_URL
    value: "nats://nats.messaging.svc.cluster.local:4222"
  # ── Auth (SSO) — JWKS/issuer/audience for JWT validation ──
  - name: AUTH_SERVICE_URL
    value: "https://sso.codevertexitsolutions.com"
  - name: AUTH_JWKS_URL
    value: "https://sso.codevertexitsolutions.com/api/v1/.well-known/jwks.json"
  - name: AUTH_ISSUER
    value: "https://sso.codevertexitsolutions.com"
  - name: AUTH_AUDIENCE
    value: "codevertex"
  # ── S2S owner-service URLs. INTERNAL_SERVICE_KEY from erp-api-env. ──
  # Treasury via the public ingress (matches notifications-api/pos-api/ordering/
  # subscriptions). The direct ClusterIP bypasses the ingress + KEDA
  # http-interceptor and fails when treasury-api is scaled-to-zero / mid-restart.
  - name: TREASURY_SERVICE_URL
    value: "https://booksapi.codevertexitsolutions.com"
  - name: NOTIFICATIONS_SERVICE_URL
    value: "http://notifications-api.notifications.svc.cluster.local:4000"
  - name: HTTP_ALLOWED_ORIGINS
    value: "https://erp.masterspace.co.ke,https://erpapi.masterspace.co.ke,https://erp.codevertexitsolutions.com"
  # ── Distributed rate limiting (Redis sliding-window). Per-tenant general budget + stricter
  # per-endpoint limits on money paths (payroll/backups/fx). Fails open if Redis is down. ──
  - name: RATE_LIMIT_ENABLED
    value: "true"
  - name: RATE_LIMIT_REQUESTS_PER_MINUTE
    value: "120"
  - name: RATE_LIMIT_REQUESTS_PER_HOUR
    value: "3000"
  - name: RATE_LIMIT_PAYMENT_PER_MINUTE
    value: "20"
  - name: RATE_LIMIT_AUTH_PER_MINUTE
    value: "10"
  - name: RATE_LIMIT_BURST_MULTIPLIER
    value: "1.5"
  - name: RATE_LIMIT_KEY_PREFIX
    value: "rl:erp:"
# VPA (recommendation-only)
verticalPodAutoscaling:
  enabled: true
  updateMode: "Off"
  minCPU: 100m
  maxCPU: 2000m
  minMemory: 256Mi
  maxMemory: 2Gi
  controlledResources: ["cpu", "memory"]
  controlledValues: RequestsAndLimits
  recommendationMode: true
pdb:
  enabled: true
  minAvailable: 1
