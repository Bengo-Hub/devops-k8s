nameOverride: erp-api
fullnameOverride: erp-api
replicaCount: 1
minReadySeconds: 30
image:
  repository: docker.io/codevertex/erp-api
  tag: "28edef59" # CI bumps this on merge to main
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 80
  targetPort: 4000
# ============================================================================
# MIGRATIONS AND SEEDING
# ============================================================================
# Go ERP: Ent (Atlas) migrations + RBAC seed are applied OUT-OF-BAND by the
# repo build.sh (idempotent one-off Jobs against the existing bengo_erp DB /
# `erp` schema). The Go server does NOT auto-migrate in prod. Django-era init
# containers (migrations/seed) are therefore disabled here.
migrations:
  enabled: false # Go: handled idempotently by build.sh (cmd/migrate, schema erp)
seed:
  enabled: false # Go: handled idempotently by build.sh (cmd/seed, RBAC upsert)
# Strategy for zero-downtime updates
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
# Pod security context: the erp-api Go image ships a non-root user "app".
securityContext:
  runAsNonRoot: true
# ============================================================================
# HEALTH CHECKS (Go server: /healthz liveness, /readyz readiness)
# ============================================================================
# No migration waits — the Go binary starts in seconds (migrations run as
# separate one-off Jobs, not in the pod).
healthCheck:
  enabled: true
  startup:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 30 # ~155s budget for cold start / DB connect
  readiness:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 5
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 768Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Large file uploads for documents, receipts, etc.
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    # Tenant-specific domain (Masterspace)
    - host: erpapi.masterspace.co.ke
      paths:
        - path: /
          pathType: Prefix
    # Platform owner domain (CodeVertex)
    - host: erpapi.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - erpapi.masterspace.co.ke
      secretName: erpapi-masterspace-tls
    - hosts:
        - erpapi.codevertexitsolutions.com
      secretName: erpapi-codevertex-tls
# Load standardized keys (POSTGRES_URL, INTERNAL_SERVICE_KEY, REDIS_URL, etc.)
# from the pre-existing erp-api-env secret.
envFromSecret: erp-api-env
# ServiceMonitor / monitoring (Prometheus Operator CRDs not installed)
serviceMonitor:
  enabled: false
monitoring:
  enabled: false
# Persistent storage for media uploads
persistence:
  enabled: true
  size: 20Gi
  mountPath: /app/media
  accessMode: ReadWriteOnce
  storageClass: local-path
# ============================================================================
# ENVIRONMENT VARIABLES (Go config; namespace = "" so no service prefix)
# ============================================================================
# POSTGRES_URL + INTERNAL_SERVICE_KEY + REDIS_URL come from the erp-api-env
# secret (envFromSecret above). The Go config appends search_path=erp via
# DB_SCHEMA — DB creds are never hardcoded here.
env:
  - name: APP_ENV
    value: production
  - name: HTTP_PORT
    value: "4000"
  # Go ERP lives in the dedicated `erp` Postgres schema on the bengo_erp DB.
  - name: DB_SCHEMA
    value: "erp"
  - name: REDIS_ADDR
    value: "redis-master.infra.svc.cluster.local:6379"
  - name: MEDIA_ROOT
    value: "/app/media"
  # ── NATS events: the Go server runs the outbox poller + JetStream consumers in-process ──
  - name: EVENTS_ENABLED
    value: "true"
  - name: EVENTS_SOURCE_SERVICE
    value: "erp"
  - name: EVENTS_NATS_URL
    value: "nats://nats.messaging.svc.cluster.local:4222"
  # ── Auth (SSO) — JWKS/issuer/audience for JWT validation ──
  - name: AUTH_SERVICE_URL
    value: "https://sso.codevertexitsolutions.com"
  - name: AUTH_JWKS_URL
    value: "https://sso.codevertexitsolutions.com/api/v1/.well-known/jwks.json"
  - name: AUTH_ISSUER
    value: "https://sso.codevertexitsolutions.com"
  - name: AUTH_AUDIENCE
    value: "codevertex"
  # ── S2S owner-service URLs (cluster-local). INTERNAL_SERVICE_KEY from erp-api-env. ──
  - name: TREASURY_SERVICE_URL
    value: "http://treasury-api.treasury.svc.cluster.local:4000"
  - name: NOTIFICATIONS_SERVICE_URL
    value: "http://notifications-api.notifications.svc.cluster.local:4000"
  - name: HTTP_ALLOWED_ORIGINS
    value: "https://erp.masterspace.co.ke,https://erpapi.masterspace.co.ke,https://erp.codevertexitsolutions.com"
# VPA (recommendation-only)
verticalPodAutoscaling:
  enabled: true
  updateMode: "Off"
  minCPU: 100m
  maxCPU: 2000m
  minMemory: 256Mi
  maxMemory: 2Gi
  controlledResources: ["cpu", "memory"]
  controlledValues: RequestsAndLimits
  recommendationMode: true
