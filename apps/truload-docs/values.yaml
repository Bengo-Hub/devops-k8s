nameOverride: truload-docs
fullnameOverride: truload-docs

image:
  repository: docker.io/codevertex/truload-docs
  tag: 9c4c47c6
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: kuraweigh-docs.masterspace.co.ke
      paths:
        - path: /
          pathType: Prefix
    - host: truload-docs.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: truload-docs-tls
      hosts:
        - kuraweigh-docs.masterspace.co.ke
        - truload-docs.codevertexitsolutions.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

replicaCount: 1
