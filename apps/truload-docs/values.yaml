nameOverride: truload-docs
fullnameOverride: truload-docs

image:
  repository: docker.io/codevertex/truload-docs
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

# Chart-managed ingress disabled: traffic routes through the
# keda-http-interceptor bridge in manifests/keda-http/truload-docs.yaml
# (scale-to-zero). See docs/keda-scale-to-zero-2026-04-16.md.
ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: kuraweigh-docs.masterspace.co.ke
      paths:
        - path: /
          pathType: Prefix
    - host: truload-docs.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: truload-docs-tls
      hosts:
        - kuraweigh-docs.masterspace.co.ke
        - truload-docs.codevertexitsolutions.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

replicaCount: 1
