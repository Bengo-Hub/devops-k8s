apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"  # Deploy before apps (usually 10+)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://nats-io.github.io/k8s/helm/charts/
    chart: nats
    targetRevision: 1.2.4  # Pinned valid version
    helm:
      values: |
        config:
          cluster:
            enabled: true
            replicas: 2
          jetstream:
            enabled: true
            fileStore:
              enabled: true
              pvc:
                enabled: true
                size: 10Gi
              storageDirectory: /data/nats-js
          leafnodes:
            enabled: true
        
        # Service name overrides to match 'nats.messaging.svc.cluster.local'
        # The chart creates 'nats' service by default.
        
        # Resource limits and healthcheck override
        container:
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 1Gi
            # Override readiness probe to fix "failed to be ready after 1ms" warnings.
            # The default nats-server check uses a 1ms timeout which fails under
            # momentary CPU/GC pressure. Increase to 5s.
            readinessProbe:
              exec:
                command:
                  - nats-server
                  - check
                  - connection
                  - --timeout=5s
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 10
              failureThreshold: 3
        
        # Disable reloader sidecar - causes "too many open files" on pods
        # with large JetStream data. Config reload via kubectl rollout restart
        reloader:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: messaging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
