apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"  # Deploy before apps (usually 10+)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://nats-io.github.io/k8s/helm/charts/
    chart: nats
    targetRevision: 1.2.4  # Pinned valid version
    helm:
      values: |
        config:
          # Disable NATS 2.10 route pooling (default pool_size=3). On this 2-node
          # JetStream cluster, pooled routes broke CROSS-NODE JS PubAck routing:
          # publishes from a client pinned to nats-1 to a stream led by nats-0 returned
          # "nats: no response from stream" (core pubs + raft worked; only JS-API
          # request/reply failed). pool_size:-1 forces a single route connection per peer
          # (pre-2.10 behaviour), restoring JS-API reply routing. Deep-merged into the
          # generated cluster{} block via config.merge.
          merge:
            cluster:
              pool_size: -1
          cluster:
            enabled: true
            # 3 nodes for a QUORATE JetStream meta cluster + R3 streams (every node holds a
            # replica, raft group spans all nodes) -> fixes the cross-node JS publish fault
            # of the 2-node R1-split topology. NOTE: prod is a single k8s node, so this is
            # logical/process quorum + correct routing, NOT physical-node HA.
            replicas: 3
          jetstream:
            enabled: true
            fileStore:
              enabled: true
              pvc:
                enabled: true
                size: 10Gi
              storageDirectory: /data/nats-js
          leafnodes:
            enabled: true
        
        # Service name overrides to match 'nats.messaging.svc.cluster.local'
        # The chart creates 'nats' service by default.
        
        # Resource limits and healthcheck override
        container:
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 1Gi
            # Override readiness probe to fix "failed to be ready after 1ms" warnings.
            # The default nats-server check uses a 1ms timeout which fails under
            # momentary CPU/GC pressure. Increase to 5s.
            readinessProbe:
              exec:
                command:
                  - nats-server
                  - check
                  - connection
                  - --timeout=5s
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 10
              failureThreshold: 3
        
        # Disable reloader sidecar - causes "too many open files" on pods
        # with large JetStream data. Config reload via kubectl rollout restart
        reloader:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: messaging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
