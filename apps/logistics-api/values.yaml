nameOverride: logistics-api
fullnameOverride: logistics-api
replicaCount: 1 # Optimized for resource-constrained environment
image:
  repository: docker.io/codevertex/logistics-api
  tag: "ca429e64"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 4000
  targetPort: 4000
# ============================================================================
# MIGRATIONS AND SEEDING
# ============================================================================
# Migrations and seed are handled by entrypoint.sh on container startup.
migrations:
  enabled: false # Handled by entrypoint.sh (runs logistics-migrate on startup)
seed:
  enabled: false # Handled by entrypoint.sh (runs logistics-seed on startup)
healthCheck:
  enabled: true
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 20
strategy:
  type: RollingUpdate
env:
  # Standardized Go backend env vars — no service prefix (config.go namespace = "")
  - name: APP_ENV
    value: production
  - name: HTTP_PORT
    value: "4000"
  - name: POSTGRES_URL
    valueFrom:
      secretKeyRef:
        name: logistics-api-secrets
        key: POSTGRES_URL
  # Database connection pool settings (prevent connection exhaustion)
  - name: POSTGRES_MAX_OPEN_CONNS
    value: "8"
  - name: POSTGRES_MAX_IDLE_CONNS
    value: "4"
  - name: POSTGRES_CONN_MAX_LIFETIME
    value: "15m"
  - name: REDIS_ADDR
    value: redis-master.infra.svc.cluster.local:6379
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: logistics-api-secrets
        key: REDIS_PASSWORD
        optional: true
  # NATS - standard key EVENTS_NATS_URL (Events.NATSURL in config)
  - name: EVENTS_NATS_URL
    value: "nats://nats.messaging.svc.cluster.local:4222,nats://nats.codevertexitsolutions.com:4222"
  - name: OTLP_ENDPOINT
    value: http://otel-collector.infra.svc.cluster.local:4317
  - name: HTTP_ALLOWED_ORIGINS
    value: "https://ordersapp.codevertexitsolutions.com,https://orderapi.codevertexitsolutions.com,https://pos.codevertexitsolutions.com,https://accounts.codevertexitsolutions.com,https://sso.codevertexitsolutions.com,http://localhost:3000,https://riderapp.codevertexitsolutions.com,http://localhost:3001,https://logistics.codevertexitsolutions.com,https://theurbanloftcafe.com"
  # Routing engine (Valhalla in-cluster)
  - name: ROUTING_PRIMARY_URL
    value: "http://valhalla.logistics.svc.cluster.local:8002"
  - name: ROUTING_CACHE_TTL
    value: "5m"
  # Auth/JWKS — override dev defaults (auth.codevertex.local) with production SSO
  - name: AUTH_SERVICE_URL
    value: "https://sso.codevertexitsolutions.com"
  - name: AUTH_ISSUER
    value: "https://sso.codevertexitsolutions.com"
  - name: AUTH_JWKS_URL
    value: "https://sso.codevertexitsolutions.com/api/v1/.well-known/jwks.json"
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 50m # Minimal - service not actively used
    memory: 128Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
serviceMonitor:
  enabled: true
  namespace: infra
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # CORS: allow frontend origins (see shared-docs/devops-k8s-ingress-cors.md)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://logistics.codevertexitsolutions.com, https://riderapp.codevertexitsolutions.com, https://ordersapp.codevertexitsolutions.com, https://pos.codevertexitsolutions.com, https://accounts.codevertexitsolutions.com, https://sso.codevertexitsolutions.com, http://localhost:3000, http://localhost:3001, https://theurbanloftcafe.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Accept, Authorization, Content-Type, X-Tenant-ID, X-Tenant-Slug, X-Request-ID"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "300"
  hosts:
    - host: logisticsapi.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - logisticsapi.codevertexitsolutions.com
      secretName: logisticsapi-tls
