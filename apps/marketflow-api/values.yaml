# ============================================================================
# MarketFlow API - AI Marketing Automation Platform
# ============================================================================
nameOverride: marketflow-api
fullnameOverride: marketflow-api
image:
  repository: docker.io/codevertex/marketflow-api
  tag: "c70e4c86"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
# ============================================================================
# REPLICA AND SCALING
# ============================================================================
replicaCount: 1
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75
# ============================================================================
# SERVICE
# ============================================================================
service:
  type: ClusterIP
  port: 4000
  targetPort: 4000
# ============================================================================
# DEPLOYMENT STRATEGY
# ============================================================================
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
minReadySeconds: 30
progressDeadlineSeconds: 900
# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
env:
  - name: APP_ENV
    value: production
  - name: HTTP_PORT
    value: "4000"
  - name: HTTP_ALLOWED_ORIGINS
    value: "https://marketflow.codevertexitsolutions.com,https://accounts.codevertexitsolutions.com"
  # Database
  - name: POSTGRES_URL
    valueFrom:
      secretKeyRef:
        name: marketflow-api-secrets
        key: POSTGRES_URL
  - name: POSTGRES_MAX_OPEN_CONNS
    value: "4"
  - name: POSTGRES_MAX_IDLE_CONNS
    value: "2"
  - name: POSTGRES_CONN_MAX_LIFETIME
    value: "15m"
  - name: POSTGRES_RUN_MIGRATIONS
    value: "true"
  # Redis
  - name: REDIS_ADDR
    value: redis-master.infra.svc.cluster.local:6379
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: marketflow-api-secrets
        key: REDIS_PASSWORD
        optional: true
  - name: REDIS_NAMESPACE
    value: marketflow
  # NATS Events
  - name: MF_EVENTS_NATS_URL
    value: "nats://nats.messaging.svc.cluster.local:4222,nats://nats.codevertexitsolutions.com:4222"
  - name: MF_EVENTS_ENABLED
    value: "true"
  # Security (JWT via auth-api JWKS)
  - name: MF_SECURITY_REQUIRE_JWT
    value: "true"
  - name: MF_SECURITY_JWKS_URL
    value: "https://sso.codevertexitsolutions.com/api/v1/.well-known/jwks.json"
  - name: MF_SECURITY_JWT_ISSUER
    value: "https://sso.codevertexitsolutions.com"
  - name: MF_SECURITY_JWT_AUDIENCE
    value: "codevertex"
  - name: MF_SECURITY_AUTH_SERVICE_URL
    value: "https://sso.codevertexitsolutions.com"
  # 32-byte base64 key used to encrypt ProviderSetting secrets at rest.
  # Must be populated before any provider_configure call with secret_keys;
  # rotation requires re-encrypting existing rows.
  - name: MF_SECURITY_ENCRYPTION_KEY
    valueFrom:
      secretKeyRef:
        name: marketflow-api-secrets
        key: ENCRYPTION_KEY
        optional: true
  - name: MF_META_VERIFY_TOKEN
    valueFrom:
      secretKeyRef:
        name: marketflow-api-secrets
        key: META_VERIFY_TOKEN
        optional: true
  # Meta Marketing API
  - name: MF_META_APP_ID
    valueFrom:
      secretKeyRef:
        name: marketflow-api-secrets
        key: META_APP_ID
        optional: true
  - name: MF_META_APP_SECRET
    valueFrom:
      secretKeyRef:
        name: marketflow-api-secrets
        key: META_APP_SECRET
        optional: true
  # AI / LLM
  - name: MF_AI_OLLAMA_URL
    value: "http://ollama.shared-infra.svc.cluster.local:11434"
  - name: MF_AI_OLLAMA_MODEL
    value: "llama3.1:8b"
  - name: MF_AI_CLAUDE_API_KEY
    valueFrom:
      secretKeyRef:
        name: marketflow-api-secrets
        key: CLAUDE_API_KEY
        optional: true
  - name: MF_AI_EMBEDDING_MODEL
    value: "nomic-embed-text"
  - name: MF_AI_EMBEDDING_DIM
    value: "768"
  # ── Worker sidecar env (NATS consumer runs inside the same pod) ────────────
  - name: NATS_URL
    value: "nats://nats.messaging.svc.cluster.local:4222"
  - name: NATS_STREAM
    value: "MARKETFLOW"
  - name: WORKER_HTTP_PORT
    value: "4002"
  - name: SCHEDULER_INTERVAL_SECONDS
    value: "60"
  - name: SCHEDULER_BATCH_SIZE
    value: "50"
  - name: MF_WORKER_API_URL
    value: "http://marketflow-api.marketflow.svc.cluster.local:4000"
  - name: MF_WORKER_OLLAMA_URL
    value: "http://ollama.shared-infra.svc.cluster.local:11434"
  - name: MF_WORKER_EMBEDDING_MODEL
    value: "nomic-embed-text"
  - name: NOTIFICATIONS_URL
    value: "http://notifications-api.notifications.svc.cluster.local:4000"
  - name: NOTIFICATIONS_API_KEY
    valueFrom:
      secretKeyRef:
        name: marketflow-api-secrets
        key: NOTIFICATIONS_API_KEY
        optional: true
# ============================================================================
# MIGRATIONS
# ============================================================================
migrations:
  enabled: false
seed:
  enabled: false
# ============================================================================
# RESOURCES
# ============================================================================
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
# ============================================================================
# HEALTH CHECKS
# ============================================================================
healthCheck:
  enabled: true
  startup:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 60
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 10
    failureThreshold: 5
# ============================================================================
# INGRESS
# ============================================================================
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://marketflow.codevertexitsolutions.com,https://accounts.codevertexitsolutions.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Accept, Authorization, Content-Type, X-Tenant-Slug, X-Tenant-ID"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "200"
  hosts:
    - host: marketflowapi.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - marketflowapi.codevertexitsolutions.com
      secretName: marketflow-api-tls
# ============================================================================
# MONITORING
# ============================================================================
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
serviceMonitor:
  enabled: true
  namespace: infra
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus
  selector:
    matchLabels:
      app: marketflow-api
# ============================================================================
# SECURITY
# ============================================================================
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  runAsNonRoot: true
pdb:
  enabled: false
