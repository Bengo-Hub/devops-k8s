apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-session-cleanup
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"  # Deploy after auth-api (wave 10+)
spec:
  project: default
  source:
    repoURL: https://github.com/Bengo-Hub/devops-k8s.git
    targetRevision: main
    path: manifests
    directory:
      include: auth-session-cleanup-cronjob.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false  # auth namespace already exists
