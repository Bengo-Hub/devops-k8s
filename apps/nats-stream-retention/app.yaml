apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats-stream-retention
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"  # After NATS (wave 5) and all app services
spec:
  project: default
  source:
    repoURL: https://github.com/Bengo-Hub/devops-k8s.git
    targetRevision: main
    path: manifests
    directory:
      include: nats-stream-retention-job.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: messaging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
