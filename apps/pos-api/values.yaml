nameOverride: pos-api
fullnameOverride: pos-api
replicaCount: 1 # Optimized for resource-constrained environment
image:
  repository: docker.io/codevertex/pos-api
  # Pinned to last known-good tag. Image 0e86af28 has an ent init panic
  # ("interface {} is nil, not string") — app-side bug, not a pgbouncer issue.
  tag: "459259cb"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 4000
  targetPort: 4000
# ============================================================================
# MIGRATIONS AND SEEDING
# ============================================================================
# Migrations and seed are handled by entrypoint.sh on container startup.
migrations:
  enabled: false # Handled by entrypoint.sh (Schema.Create on startup)
seed:
  enabled: false # Handled by entrypoint.sh (runs pos-seed on startup)
healthCheck:
  enabled: true
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 20
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0 # terminate old pod (release NATS push-durable bindings) before new subscribes
    maxUnavailable: 1
env:
  # Standardized Go backend env vars — no service prefix (config.go namespace = "")
  - name: APP_ENV
    value: production
  - name: HTTP_PORT
    value: "4000"
  - name: POSTGRES_URL
    valueFrom:
      secretKeyRef:
        name: pos-api-secrets
        key: POSTGRES_URL
  # Direct PostgreSQL URL for migrate/seed (bypasses PgBouncer transaction mode)
  - name: POSTGRES_MIGRATE_URL
    valueFrom:
      secretKeyRef:
        name: pos-api-secrets
        key: POSTGRES_MIGRATE_URL
        optional: true
  # Database connection pool settings (prevent connection exhaustion)
  - name: POSTGRES_MAX_OPEN_CONNS
    value: "8"
  - name: POSTGRES_MAX_IDLE_CONNS
    value: "4"
  - name: POSTGRES_CONN_MAX_LIFETIME
    value: "15m"
  - name: REDIS_ADDR
    value: redis-master.infra.svc.cluster.local:6379
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: pos-api-secrets
        key: REDIS_PASSWORD
        optional: true
  # NATS - standard key EVENTS_NATS_URL (Events.NATSURL in config)
  - name: EVENTS_NATS_URL
    value: "nats://nats.messaging.svc.cluster.local:4222,nats://nats.codevertexitsolutions.com:4222"
  - name: OTLP_ENDPOINT
    value: http://otel-collector.infra.svc.cluster.local:4317
  - name: HTTP_ALLOWED_ORIGINS
    value: "https://pos.codevertexitsolutions.com,https://ordersapp.codevertexitsolutions.com,https://accounts.codevertexitsolutions.com,https://sso.codevertexitsolutions.com,https://theurbanloftcafe.com,https://books.codevertexitsolutions.com,http://localhost:3000,http://localhost:3001"
  # Shared S2S key — validates inbound requests from other services (X-API-Key header)
  - name: INTERNAL_SERVICE_KEY
    valueFrom:
      secretKeyRef:
        name: pos-api-secrets
        key: INTERNAL_SERVICE_KEY
        optional: true
  # Auth/JWKS — override dev defaults (auth.codevertex.local) with production SSO
  # S2S service URLs — values injected by CI/CD; placeholders only here
  - name: INVENTORY_SERVICE_URL
    value: "https://inventoryapi.codevertexitsolutions.com"
  - name: TREASURY_SERVICE_URL
    value: "https://booksapi.codevertexitsolutions.com"
  - name: NOTIFICATIONS_SERVICE_URL
    value: "https://notificationsapi.codevertexitsolutions.com"
  - name: ORDERING_SERVICE_URL
    value: "https://orderingapi.codevertexitsolutions.com"
  # MarketFlow CRM — customer single source of truth (upsert crm_contact_id from loyalty/client flows)
  - name: MARKETFLOW_API_URL
    value: "https://marketflowapi.codevertexitsolutions.com"
  - name: AUTH_SERVICE_URL
    value: "https://sso.codevertexitsolutions.com"
  - name: AUTH_ISSUER
    value: "https://sso.codevertexitsolutions.com"
  - name: AUTH_AUDIENCE
    value: "codevertex"
  - name: AUTH_JWKS_URL
    value: "https://sso.codevertexitsolutions.com/api/v1/.well-known/jwks.json"
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
# Safe at >=2 replicas as of pos-api#64: core NATS subscribers are queue-grouped
# (one pod per event); JetStream push-durables are active-passive (idempotent
# handlers + non-fatal bind). Min 2 for HA.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
serviceMonitor:
  enabled: true
  namespace: infra
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # CORS: allow frontend origins (see shared-docs/devops-k8s-ingress-cors.md).
    # books.codevertexitsolutions.com = the embedded treasury/Paystack ("Books") payment iframe origin
    # that POSTs to /pos/payments/initiate — without it the gateway init is CORS-blocked.
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://pos.codevertexitsolutions.com, https://ordersapp.codevertexitsolutions.com, https://accounts.codevertexitsolutions.com, https://sso.codevertexitsolutions.com, https://theurbanloftcafe.com, https://books.codevertexitsolutions.com, http://localhost:3000, http://localhost:3001"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Accept, Authorization, Content-Type, X-Tenant-ID, X-Tenant-Slug, X-Request-ID, X-Outlet-ID, X-API-Key, Idempotency-Key"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "300"
    # SSE: the notifications stream needs nginx to stop buffering and not cut the long-lived
    # connection at the default 60s (avoids buffered/dropped events + needless reconnects).
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  hosts:
    - host: posapi.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - posapi.codevertexitsolutions.com
      secretName: posapi-tls
pdb:
  enabled: true
  minAvailable: 1
