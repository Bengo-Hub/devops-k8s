apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: calcom
  namespace: calcom
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - calendar.codevertexitsolutions.com
      secretName: calcom-tls
  rules:
    - host: calendar.codevertexitsolutions.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: calcom
                port:
                  number: 80
