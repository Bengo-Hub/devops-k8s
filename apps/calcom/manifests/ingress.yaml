apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: calcom
  namespace: calcom
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Cold-start on scale-from-zero can take 45-90s. Extend read timeout
    # so nginx doesn't time out waiting for the first response.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - calendar.codevertexitsolutions.com
      secretName: calcom-tls
  rules:
    - host: calendar.codevertexitsolutions.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              # Route through KEDA HTTP interceptor (see http-scaled.yaml)
              # for scale-to-zero. Keeping the deployment at 0 replicas
              # when idle saves ~512Mi RAM + a full Next.js worker.
              service:
                name: keda-http-interceptor
                port:
                  number: 8080
