nameOverride: cafe-website
fullnameOverride: cafe-website
replicaCount: 1
minReadySeconds: 30
image:
  repository: docker.io/codevertex/cafe-website
  tag: "989a9100"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
# Simplified health checks for Next.js app
healthCheck:
  enabled: true
  readiness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
# Environment variables - must match cafe-website src/config/env.ts and auth/sso usage.
# For Next.js, NEXT_PUBLIC_* are baked at build time; pass these as Docker build-args in build.sh
# so production image has correct URLs. These env entries override at runtime where supported.
env:
  - name: NODE_ENV
    value: "production"
  # Service base URLs (cafe-website integrates with these for menu, auth, notifications, etc.)
  - name: NEXT_PUBLIC_AUTH_SERVICE_URL
    value: https://sso.codevertexitsolutions.com
  - name: NEXT_PUBLIC_AUTH_UI_URL
    value: https://accounts.codevertexitsolutions.com
  - name: NEXT_PUBLIC_ORDERING_SERVICE_URL
    value: https://orderingapi.codevertexitsolutions.com
  - name: NEXT_PUBLIC_NOTIFICATIONS_SERVICE_URL
    value: https://notificationsapi.codevertexitsolutions.com
  - name: NEXT_PUBLIC_LOGISTICS_SERVICE_URL
    value: https://logisticsapi.codevertexitsolutions.com
  - name: NEXT_PUBLIC_TREASURY_SERVICE_URL
    value: https://booksapi.codevertexitsolutions.com
  - name: NEXT_PUBLIC_INVENTORY_SERVICE_URL
    value: https://inventoryapi.codevertexitsolutions.com
  - name: NEXT_PUBLIC_SITE_URL
    value: https://theurbanloftcafe.com
  - name: NEXT_PUBLIC_APP_URL
    value: https://theurbanloftcafe.com
  - name: NEXT_PUBLIC_TENANT_SLUG
    value: urban-loft
  - name: NEXT_PUBLIC_TENANT_ID
    value: tenant-urban-loft
# Use envFromSecret for optional secrets (tokens, DSN, etc.)
envFromSecret: cafe-website-env
# Resource constraints optimized for Next.js app
resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 128Mi
# Disable autoscaling for single instance
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: theurbanloftcafe.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - theurbanloftcafe.com
      secretName: cafe-website-tls
monitoring:
  enabled: false
serviceMonitor:
  enabled: false
# VPA configuration for UI - recommendation-only mode
verticalPodAutoscaling:
  enabled: true
  updateMode: "Off"
  minCPU: 50m
  maxCPU: 1000m
  minMemory: 128Mi
  maxMemory: 2Gi
  controlledResources: ["cpu", "memory"]
  controlledValues: RequestsAndLimits
  recommendationMode: true
