nameOverride: notifications-api
fullnameOverride: notifications-api
replicaCount: 1
image:
  # Note: image name is notifications-api (from build.sh APP_NAME)
  repository: docker.io/codevertex/notifications-api
  tag: "3e6df541"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 4000
  targetPort: 4000
# ============================================================================
# MIGRATIONS AND SEEDING
# ============================================================================
# Notifications-api uses separate migrate/seed binaries in the Docker image
# Binary names must match the Dockerfile output: /usr/local/bin/notifications-migrate, etc.
# Migrations and seed are handled by entrypoint.sh on container startup.
# No separate Helm hooks needed — entrypoint waits for DB, runs migrate, seeds, then starts server.
migrations:
  enabled: false # Handled by entrypoint.sh (runs notifications-migrate on startup)
seed:
  enabled: false # Handled by entrypoint.sh (runs notifications-seed on startup)
# ============================================================================
# SECRET REFERENCE FOR HOOKS
# ============================================================================
# Uses notifications-api-env created by service's build.sh (create-service-secrets.sh).
# Must contain POSTGRES_URL so migrate/seed hook jobs can run. When migrating to
# "migrate on startup" (entrypoint), set migrations.enabled and seed.enabled to false.
envFromSecret: notifications-api-env
healthCheck:
  enabled: true
  startup:
    httpGet:
      path: /api/v1/healthz
      port: http
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 60 # 10 minutes total for startup (includes waiting for migrations)
  readiness:
    httpGet:
      path: /api/v1/healthz
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5
  liveness:
    httpGet:
      path: /api/v1/healthz
      port: http
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 10
    failureThreshold: 5
# ============================================================================
# DEPLOYMENT STRATEGY
# ============================================================================
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
minReadySeconds: 30
progressDeadlineSeconds: 900 # 15 minutes for migrations and startup
# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
# Env var naming: tags are the full env var name (envconfig:"" on parent structs
# suppresses struct field prefix). E.g. POSTGRES_URL, REDIS_ADDR, SECURITY_REQUIRE_JWT.
env:
  # App and HTTP
  - name: APP_ENV
    value: production
  - name: HTTP_PORT
    value: "4000"
  - name: HTTP_ALLOWED_ORIGINS
    value: "https://notifications.codevertexitsolutions.com,https://ordersapp.codevertexitsolutions.com,https://pricing.codevertexitsolutions.com,https://books.codevertexitsolutions.com,https://accounts.codevertexitsolutions.com,https://sso.codevertexitsolutions.com,https://theurbanloftcafe.com,http://localhost:3000,http://localhost:3001"
  # Database and Redis
  - name: POSTGRES_URL
    valueFrom:
      secretKeyRef:
        name: notifications-api-env
        key: POSTGRES_URL
  # Database connection pool settings (prevent connection exhaustion)
  - name: POSTGRES_MAX_OPEN_CONNS
    value: "6"
  - name: POSTGRES_MAX_IDLE_CONNS
    value: "3"
  - name: POSTGRES_CONN_MAX_LIFETIME
    value: "15m"
  - name: REDIS_ADDR
    value: redis-master.infra.svc.cluster.local:6379
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: notifications-api-env
        key: REDIS_PASSWORD
        optional: true
  # NATS - standard key EVENTS_NATS_URL (Events.NATSURL in config)
  - name: EVENTS_NATS_URL
    value: "nats://nats.messaging.svc.cluster.local:4222,nats://nats.codevertexitsolutions.com:4222"
  # Provider secrets (optional - create notifications-provider-secrets manually)
  - name: PROVIDERS_SENDGRID_API_KEY
    valueFrom:
      secretKeyRef:
        name: notifications-provider-secrets
        key: sendgridApiKey
        optional: true
  - name: PROVIDERS_TWILIO_ACCOUNT_SID
    valueFrom:
      secretKeyRef:
        name: notifications-provider-secrets
        key: twilioAccountSid
        optional: true
  - name: PROVIDERS_TWILIO_AUTH_TOKEN
    valueFrom:
      secretKeyRef:
        name: notifications-provider-secrets
        key: twilioAuthToken
        optional: true
  - name: PROVIDERS_FCM_SERVICE_ACCOUNT
    valueFrom:
      secretKeyRef:
        name: notifications-provider-secrets
        key: fcmServiceAccount
        optional: true
  - name: PROVIDERS_DEFAULT_EMAIL_SENDER
    valueFrom:
      secretKeyRef:
        name: notifications-api-env
        key: NOTIFICATIONS_DEFAULT_EMAIL_SENDER
        optional: true
  # Service URLs for email links (override tenant website for specific services)
  - name: NOTIFICATIONS_ORDERING_APP_URL
    value: "https://ordersapp.codevertexitsolutions.com"
  - name: NOTIFICATIONS_RIDER_APP_URL
    value: "https://riderapp.codevertexitsolutions.com/"
  - name: NOTIFICATIONS_SSO_UI_URL
    value: "https://accounts.codevertexitsolutions.com"
  - name: NOTIFICATIONS_TREASURY_APP_URL
    value: "https://books.codevertexitsolutions.com"
  - name: NOTIFICATIONS_POS_APP_URL
    value: "https://pos.codevertexitsolutions.com"
  - name: NOTIFICATIONS_LOGISTICS_APP_URL
    value: "https://logistics.codevertexitsolutions.com"
  # Observability
  - name: OTLP_ENDPOINT
    value: http://otel-collector.infra.svc.cluster.local:4317
  # Security JWT
  - name: SECURITY_REQUIRE_JWT
    value: "true"
  - name: SECURITY_JWKS_URL
    value: "https://sso.codevertexitsolutions.com/api/v1/.well-known/jwks.json"
  - name: SECURITY_JWT_ISSUER
    value: "https://sso.codevertexitsolutions.com"
  - name: SECURITY_JWT_AUDIENCE
    value: "codevertex"
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
serviceMonitor:
  enabled: true
  namespace: infra
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus
  selector:
    matchLabels:
      app: notifications-api
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # CORS: allow notifications-ui and other frontend origins (see shared-docs/devops-k8s-ingress-cors.md)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://notifications.codevertexitsolutions.com, https://ordersapp.codevertexitsolutions.com, https://accounts.codevertexitsolutions.com, https://sso.codevertexitsolutions.com, https://pricing.codevertexitsolutions.com, https://books.codevertexitsolutions.com, https://theurbanloftcafe.com, http://localhost:3000, http://localhost:3001"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Accept, Authorization, Content-Type, X-Tenant-Slug, X-Tenant-ID"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "300"
  hosts:
    - host: notificationsapi.codevertexitsolutions.com # ui uses notifications.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - notificationsapi.codevertexitsolutions.com
      secretName: notifications-api-tls
# ============================================================================
# SECURITY CONFIGURATION
# ============================================================================
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  runAsNonRoot: true
# ============================================================================
# POD DISRUPTION BUDGET
# ============================================================================
pdb:
  enabled: false
