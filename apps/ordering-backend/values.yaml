# Ordering Service Backend Production Configuration
nameOverride: ordering-backend
fullnameOverride: ordering-backend
# ============================================================================
# IMAGE CONFIGURATION
# ============================================================================
image:
  repository: docker.io/codevertex/ordering-backend
  tag: "a77a260b"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
# ============================================================================
# REPLICA AND SCALING CONFIGURATION
# ============================================================================
replicaCount: 1
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 75
# ============================================================================
# SERVICE CONFIGURATION
# ============================================================================
service:
  type: ClusterIP
  port: 4000
  targetPort: 4000
# ============================================================================
# DEPLOYMENT STRATEGY
# ============================================================================
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
minReadySeconds: 30
progressDeadlineSeconds: 1200 # 20 minutes for migrations and startup (matches auth-api)
# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
env:
  # Core Configuration
  - name: APP_ENV
    value: production
  - name: HTTP_PORT
    value: "4000"
  - name: HTTP_ALLOWED_ORIGINS
    value: "https://ordersapp.codevertexitsolutions.com,https://orderingapi.codevertexitsolutions.com,https://theurbanloftcafe.com,https://pos.codevertexitsolutions.com,https://accounts.codevertexitsolutions.com,https://sso.codevertexitsolutions.com,http://localhost:3000,http://localhost:3001"
  # Database Configuration - uses standard keys from devops-k8s create-service-secrets.sh
  - name: POSTGRES_URL
    valueFrom:
      secretKeyRef:
        name: ordering-backend-secrets
        key: POSTGRES_URL # Standard key from devops-k8s (not ORDERING_POSTGRES_URL)
  # Database connection pool settings (prevent connection exhaustion)
  - name: POSTGRES_MAX_OPEN_CONNS
    value: "8"
  - name: POSTGRES_MAX_IDLE_CONNS
    value: "4"
  - name: POSTGRES_CONN_MAX_LIFETIME
    value: "15m"
  # Redis - standard keys (loaded via Process("", &cfg.Redis), tags are exact env var names)
  - name: REDIS_ADDR
    value: redis-master.infra.svc.cluster.local:6379
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: ordering-backend-secrets
        key: REDIS_PASSWORD
        optional: true
  # NATS - standard key EVENTS_NATS_URL (Events.NATSURL loaded via Process("", &cfg.Events))
  - name: EVENTS_NATS_URL
    value: "nats://nats.messaging.svc.cluster.local:4222,nats://nats.codevertexitsolutions.com:4222"
  - name: NATS_STREAM
    value: ordering
  # Media upload configuration
  - name: MEDIA_ROOT
    value: "/data/media"
  - name: MEDIA_URL_BASE
    value: "https://orderingapi.codevertexitsolutions.com"
  # Observability
  - name: OTLP_ENDPOINT
    value: http://otel-collector.infra.svc.cluster.local:4317
  # Auth Service (SSO) - User authentication and identity management
  - name: AUTH_SERVICE_URL
    # ============================================================================
    # MICROSERVICE INTEGRATIONS - PRODUCTION URLS
    # ============================================================================

    value: "https://sso.codevertexitsolutions.com"
  - name: AUTH_ISSUER
    value: "https://sso.codevertexitsolutions.com"
  - name: AUTH_JWKS_URL
    value: "https://sso.codevertexitsolutions.com/api/v1/.well-known/jwks.json"
  - name: AUTH_AUDIENCE
    value: "codevertex"
  - name: AUTH_SERVICE_API_KEY
    valueFrom:
      secretKeyRef:
        name: ordering-backend-secrets
        key: AUTH_SERVICE_API_KEY
        optional: true
  # Treasury Service - Payment processing and refunds
  - name: TREASURY_SERVICE_URL
    value: "https://booksapi.codevertexitsolutions.com"
  - name: TREASURY_API_KEY
    valueFrom:
      secretKeyRef:
        name: ordering-backend-secrets
        key: TREASURY_API_KEY
        optional: true
  - name: TREASURY_WEBHOOK_SECRET
    valueFrom:
      secretKeyRef:
        name: ordering-backend-secrets
        key: TREASURY_WEBHOOK_SECRET
        optional: true
  - name: TREASURY_REQUEST_TIMEOUT
    value: "30s"
  - name: MPESA_ENABLED
    value: "true"
  - name: MPESA_CALLBACK_BASE_URL
    value: "https://orderingapi.codevertexitsolutions.com/api/v1/webhooks/mpesa"
  # Logistics Service - Delivery task management
  - name: LOGISTICS_SERVICE_URL
    value: "https://logisticsapi.codevertexitsolutions.com"
  - name: LOGISTICS_API_KEY
    valueFrom:
      secretKeyRef:
        name: ordering-backend-secrets
        key: LOGISTICS_API_KEY
        optional: true
  - name: LOGISTICS_WEBHOOK_SECRET
    valueFrom:
      secretKeyRef:
        name: ordering-backend-secrets
        key: LOGISTICS_WEBHOOK_SECRET
        optional: true
  - name: LOGISTICS_REQUEST_TIMEOUT
    value: "30s"
  - name: LOGISTICS_WEBSOCKET_URL
    value: "wss://logisticsapi.codevertexitsolutions.com/ws"
  # Inventory Service - Stock management
  - name: INVENTORY_SERVICE_URL
    value: "https://inventoryapi.codevertexitsolutions.com"
  - name: INVENTORY_API_KEY
    valueFrom:
      secretKeyRef:
        name: ordering-backend-secrets
        key: INVENTORY_API_KEY
        optional: true
  - name: INVENTORY_REQUEST_TIMEOUT
    value: "10s"
  # Subscriptions Service - Subscription enforcement
  - name: SUBSCRIPTIONS_SERVICE_URL
    value: "https://pricingapi.codevertexitsolutions.com"
  - name: SUBSCRIPTIONS_REQUEST_TIMEOUT
    value: "10s"
  # Notifications Service - Email, SMS, Push notifications
  - name: NOTIFICATIONS_SERVICE_URL
    value: "https://notificationsapi.codevertexitsolutions.com"
  - name: NOTIFICATIONS_API_KEY
    valueFrom:
      secretKeyRef:
        name: ordering-backend-secrets
        key: NOTIFICATIONS_API_KEY
        optional: true
  - name: NOTIFICATIONS_REQUEST_TIMEOUT
    value: "10s"
  # Superset - Business Intelligence & Analytics
  - name: SUPERSET_BASE_URL
    value: "https://superset.codevertexitsolutions.com"
  - name: SUPERSET_ADMIN_USERNAME
    value: "admin"
  - name: SUPERSET_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: ordering-backend-secrets
        key: SUPERSET_ADMIN_PASSWORD
        optional: true
  - name: SUPERSET_API_VERSION
    value: "v1"
  - name: SUPERSET_REQUEST_TIMEOUT
    value: "30s"
  - name: SUPERSET_GUEST_TOKEN_TTL_MINUTES
    value: "5"
# ============================================================================
# SECRET REFERENCE FOR HOOKS
# ============================================================================
envFromSecret: ordering-backend-secrets
# ============================================================================
# MIGRATIONS AND SEEDING
# ============================================================================
# Ordering-backend uses Ent ORM for schema management
# migrations: Runs Ent schema.Create() to create/update tables
# seed: Populates initial data (roles, permissions, demo tenant)
migrations:
  enabled: false
  binaryName: ordering-migrate
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
seed:
  enabled: false
  binaryName: ordering-seed
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
# ============================================================================
# HEALTH CHECKS
# ============================================================================
healthCheck:
  enabled: true
  startup:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 60 # 10 minutes total for startup (matches auth-api)
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 5
# ============================================================================
# RESOURCE LIMITS AND REQUESTS
# ============================================================================
# Checkout workflows involve Redis rate-limiting + DB queries + payment gateway calls.
# 500m CPU limit caused throttling during concurrent checkouts. 1 CPU limit removes throttle.
resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: 1000m
    memory: 1Gi
# ============================================================================
# INGRESS CONFIGURATION
# ============================================================================
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Rate limiting for API endpoints
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "200"
  hosts:
    - host: orderingapi.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - orderingapi.codevertexitsolutions.com
      secretName: ordering-backend-tls
# ============================================================================
# PERSISTENCE (media uploads)
# ============================================================================
persistence:
  enabled: true
  size: 5Gi
  mountPath: /data/media
  accessMode: ReadWriteOnce
  storageClass: local-path
# ============================================================================
# MONITORING AND OBSERVABILITY
# ============================================================================
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
serviceMonitor:
  enabled: true
  namespace: infra
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus
# ============================================================================
# SECURITY CONFIGURATION
# ============================================================================
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  runAsNonRoot: true
