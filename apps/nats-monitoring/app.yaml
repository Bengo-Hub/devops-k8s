apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats-monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"  # Deploy after NATS (wave 5)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Bengo-Hub/devops-k8s.git
    targetRevision: main
    path: manifests/nats-monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: messaging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
