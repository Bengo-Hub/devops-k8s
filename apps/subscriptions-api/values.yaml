nameOverride: subscription-api
fullnameOverride: subscription-api
replicaCount: 1
image:
  repository: docker.io/codevertex/subscriptions-api
  tag: "4cb6ecfe"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 4000
  targetPort: 4000
migrations:
  enabled: false
seed:
  enabled: true
  binaryName: seed
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
envFromSecret: subscription-api-secrets
healthCheck:
  enabled: true
  readiness:
    httpGet:
      path: /api/v1/health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    httpGet:
      path: /api/v1/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 20
strategy:
  type: RollingUpdate
env:
  # Standardized Go backend env vars — no service prefix (config.go namespace = "")
  - name: APP_ENV
    value: production
  - name: HTTP_PORT
    value: "4000"
  - name: POSTGRES_URL
    valueFrom:
      secretKeyRef:
        name: subscription-api-secrets
        key: POSTGRES_URL
  # Database connection pool settings (prevent connection exhaustion)
  - name: POSTGRES_MAX_OPEN_CONNS
    value: "6"
  - name: POSTGRES_MAX_IDLE_CONNS
    value: "3"
  - name: POSTGRES_CONN_MAX_LIFETIME
    value: "15m"
  - name: REDIS_ADDR
    value: redis-master.infra.svc.cluster.local:6379
  # NATS - standard key EVENTS_NATS_URL (Events.NATSURL in config)
  - name: EVENTS_NATS_URL
    value: "nats://nats.messaging.svc.cluster.local:4222,nats://nats.codevertexitsolutions.com:4222"
  - name: OTLP_ENDPOINT
    value: http://otel-collector.infra.svc.cluster.local:4317
  - name: HTTP_ALLOWED_ORIGINS
    value: "https://pricing.codevertexitsolutions.com,https://accounts.codevertexitsolutions.com,https://sso.codevertexitsolutions.com,https://pricingapi.codevertexitsolutions.com,https://theurbanloftcafe.com,http://localhost:3000,http://localhost:3001"
  # API key validation — validates X-API-Key headers against auth-api (used for S2S calls from auth-api)
  - name: API_KEY_DB_URL
    value: "http://auth-api.auth.svc.cluster.local:4000"
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
serviceMonitor:
  enabled: true
  namespace: infra
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # CORS: allow frontend origins (see shared-docs/devops-k8s-ingress-cors.md)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://pricing.codevertexitsolutions.com, https://accounts.codevertexitsolutions.com, https://sso.codevertexitsolutions.com, https://theurbanloftcafe.com, http://localhost:3000, http://localhost:3001"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Accept, Authorization, Content-Type, X-Tenant-ID, X-Tenant-Slug, X-Request-ID"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "300"
  hosts:
    - host: pricingapi.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - pricingapi.codevertexitsolutions.com
      secretName: subscription-api-tls
