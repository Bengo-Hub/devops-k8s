nameOverride: subscriptions-api
fullnameOverride: subscriptions-api
replicaCount: 1
image:
  repository: docker.io/codevertex/subscriptions-api
  tag: "4eb2dc99"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 4000
  targetPort: 4005
migrations:
  enabled: false
seed:
  enabled: true
  binaryName: seed
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
envFromSecret: subscriptions-api-secrets
healthCheck:
  enabled: true
  readiness:
    httpGet:
      path: /api/v1/healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    httpGet:
      path: /api/v1/healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 20
strategy:
  type: RollingUpdate
env:
  # Common keys (same as all Go backends): POSTGRES_URL, REDIS_ADDR, REDIS_PASSWORD
  - name: APP_ENV
    value: production
  - name: HTTP_PORT
    value: "4005"
  - name: POSTGRES_URL
    valueFrom:
      secretKeyRef:
        name: subscriptions-api-secrets
        key: POSTGRES_URL
  - name: REDIS_ADDR
    value: redis-master.infra.svc.cluster.local:6379
  - name: REDIS_PASSWORD
    valueFrom:
      secretKeyRef:
        name: subscriptions-api-secrets
        key: REDIS_PASSWORD
        optional: true
  # NATS - standard key EVENTS_NATS_URL (Events.NATSURL in config)
  - name: EVENTS_NATS_URL
    value: nats://nats.messaging.svc.cluster.local:4222
  - name: TELEMETRY_OTLP_ENDPOINT
    value: http://otel-collector.infra.svc.cluster.local:4317
  - name: HTTP_ALLOWED_ORIGINS
    value: "https://accounts.codevertexitsolutions.com,https://sso.codevertexitsolutions.com,https://pricing.codevertexitsolutions.com,https://ordersapp.codevertexitsolutions.com,https://books.codevertexitsolutions.com,https://notifications.codevertexitsolutions.com,http://localhost:3000,http://localhost:3010"
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
serviceMonitor:
  enabled: true
  namespace: infra
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus
# Ingress CORS: allow pricing-ui, ordering, accounts (see shared-docs/devops-k8s-ingress-cors.md)
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://pricing.codevertexitsolutions.com, https://ordersapp.codevertexitsolutions.com, https://accounts.codevertexitsolutions.com, https://sso.codevertexitsolutions.com, https://books.codevertexitsolutions.com, http://localhost:3010, http://localhost:3001"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Accept, Authorization, Content-Type, X-Tenant-Slug, X-Tenant-ID"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "300"
  hosts:
    - host: pricingapi.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - pricingapi.codevertexitsolutions.com
      secretName: subscriptions-api-tls
