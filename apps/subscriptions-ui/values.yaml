nameOverride: subscriptions-ui
fullnameOverride: subscriptions-ui
replicaCount: 1
minReadySeconds: 30
image:
  repository: docker.io/codevertex/subscriptions-ui
  tag: "5c9b1f6d"
  pullPolicy: Always
  pullSecrets:
    - name: registry-credentials
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
healthCheck:
  enabled: true
  readiness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 3
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
env:
  - name: NEXT_PUBLIC_API_URL
    value: https://pricingapi.codevertexitsolutions.com
  - name: NEXT_PUBLIC_SSO_URL
    value: https://sso.codevertexitsolutions.com
  - name: NEXT_PUBLIC_NOTIFICATIONS_URL
    value: https://notifications.codevertexitsolutions.com
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
# Chart-managed ingress disabled: traffic routes through the
# keda-http-interceptor bridge in manifests/keda-http/subscriptions-ui.yaml
# (scale-to-zero). See docs/keda-scale-to-zero-2026-04-16.md.
ingress:
  enabled: false
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: pricing.codevertexitsolutions.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - pricing.codevertexitsolutions.com
      secretName: subscriptions-ui-tls
monitoring:
  enabled: false
serviceMonitor:
  enabled: false
verticalPodAutoscaling:
  enabled: true
  updateMode: "Off"
  minCPU: 50m
  maxCPU: 1000m
  minMemory: 128Mi
  maxMemory: 2Gi
  controlledResources: ["cpu", "memory"]
  controlledValues: RequestsAndLimits
  recommendationMode: true
# KEDA HTTP scale-to-zero: set enabled=true once ingress is wired to
# the keda-http-interceptor service. See docs/autoscaling-scale-to-zero.md.
httpScaledObject:
  enabled: false
  minReplicas: 0
  maxReplicas: 3
  scalingMetric:
    requestRate:
      granularity: "1s"
      targetValue: 50
      window: "1m"
